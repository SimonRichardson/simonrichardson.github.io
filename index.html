<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Simon Richardson</title>
        <meta charset="utf-8">
        <meta name="description" content="Simon Richardson, Software Engineer">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='white'/><circle cx='16' cy='16' r='12' fill='black'/></svg>">
    </head>
    <body>
        <div id="modal-overlay">
            <div class="modal-box">
                <div class="modal-title">Alert</div>
                <div id="modal-message"></div>
                <div class="modal-actions">
                    <button id="modal-ok">OK</button>
                </div>
            </div>
        </div>

        <div id="nav-window" class="win-window" tabindex="0" role="region" aria-label="Navigation">
            <div id="window-grab" class="win-grab">
                <button id="window-minimize" title="Minimize">_</button>
                <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
                <div id="grab-track" class="win-grab-track"></div>
                <button id="window-settings" title="Settings">&#9881;</button>
                <button id="window-toggle-breadcrumb" title="Toggle breadcrumb">...</button>
            </div>
            <div id="window-chrome" class="win-chrome">
                <div id="window-body" class="win-body">
                    <div id="select-container"></div>
                    <div id="breadcrumb"></div>
                </div>
            </div>
        </div>

        <div id="prefs-window" class="win-window" tabindex="0" role="region" aria-label="Preferences" style="display:none;">
            <div id="prefs-grab" class="win-grab">
                <button id="prefs-close" class="win-close-btn" title="Close">&#10005;</button>
                <button id="prefs-minimize" title="Minimize">_</button>
                <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
                <div id="prefs-grab-track" class="win-grab-track"></div>
            </div>
            <div id="prefs-chrome" class="win-chrome">
                <div id="prefs-window-body" class="win-body">
                    <button id="pref-bgcolor">Background Colour</button>
                    <button id="pref-clear-cookies">Clear Cookies</button>
                </div>
            </div>
        </div>

        <div id="color-window" class="win-window" tabindex="0" role="region" aria-label="Colour Picker" style="display:none;">
            <div id="color-grab" class="win-grab">
                <button id="color-close" class="win-close-btn" title="Close">&#10005;</button>
                <button id="color-minimize" title="Minimize">_</button>
                <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
                <div id="color-grab-track" class="win-grab-track"></div>
            </div>
            <div id="color-chrome" class="win-chrome">
                <div id="color-window-body" class="win-body">
                    <div id="color-palette"></div>
                    <div id="color-preview"></div>
                </div>
            </div>
        </div>

        <div id="background-content"></div>

        <footer id="bottom-bar">
            <span>Simon Richardson &copy; 2026</span>
            <span class="bar-links">
                <a href="https://github.com/SimonRichardson">github</a>
                <a href="https://hachyderm.io/@simonrichardson">mastodon</a>
                <a href="#cookies" class="nav-link" data-page="pages/cookies.html">cookies</a>
                <button id="dark-mode-toggle" title="Toggle dark mode">&#128161;</button>
            </span>
        </footer>


        <script>
            // --- Modal system ---
            window.showModal = function(msg) {
                var overlay = document.getElementById("modal-overlay");
                var message = document.getElementById("modal-message");
                message.textContent = msg;
                overlay.style.display = "flex";
            };
            document.getElementById("modal-ok").addEventListener("click", function() {
                document.getElementById("modal-overlay").style.display = "none";
            });

            // --- Window docking system ---
            // Any window can dock with any other window, forming a vertical chain.
            window.__dockSystem = (function() {
                var SNAP_THRESHOLD = 14;
                var windows = {};
                // dockChain: ordered array of window ids forming a docked group (top to bottom)
                var dockChain = [];

                function register(id, element) {
                    windows[id] = element;
                }

                function unregister(id) {
                    delete windows[id];
                    var idx = dockChain.indexOf(id);
                    if (idx !== -1) {
                        dockChain.splice(idx, 1);
                        if (dockChain.length < 2) undock();
                        else repositionChain();
                    }
                }

                function isDocked() { return dockChain.length >= 2; }

                function repositionChain() {
                    if (dockChain.length < 2) return;
                    var first = windows[dockChain[0]];
                    if (!first) return;
                    var top = first.offsetTop;
                    var left = first.offsetLeft;
                    for (var i = 1; i < dockChain.length; i++) {
                        var prev = windows[dockChain[i - 1]];
                        var el = windows[dockChain[i]];
                        if (!prev || !el) continue;
                        top += prev.offsetHeight + 1;
                        el.style.left = left + "px";
                        el.style.top = top + "px";
                        el.style.right = "auto";
                    }
                    showUndockButtons();
                }

                function undock() {
                    dockChain = [];
                    hideUndockButtons();
                }

                function showUndockButtons() {
                    document.querySelectorAll(".dock-undock-btn").forEach(function(b) {
                        b.style.display = "none";
                    });
                    for (var i = 0; i < dockChain.length; i++) {
                        var el = windows[dockChain[i]];
                        if (el) {
                            var btn = el.querySelector(".dock-undock-btn");
                            if (btn) btn.style.display = "block";
                        }
                    }
                }

                function hideUndockButtons() {
                    document.querySelectorAll(".dock-undock-btn").forEach(function(b) {
                        b.style.display = "none";
                    });
                }

                function getChainOffsets() {
                    var offsets = {};
                    if (dockChain.length < 2) return offsets;
                    var cumulative = 0;
                    offsets[dockChain[0]] = 0;
                    for (var i = 1; i < dockChain.length; i++) {
                        var prev = windows[dockChain[i - 1]];
                        cumulative += (prev ? prev.offsetHeight : 0) + 1;
                        offsets[dockChain[i]] = cumulative;
                    }
                    return offsets;
                }

                function onDragMove(draggedId, newLeft, newTop) {
                    var el = windows[draggedId];
                    if (!el) return;

                    el.style.left = newLeft + "px";
                    el.style.top = newTop + "px";
                    el.style.right = "auto";

                    if (dockChain.length >= 2 && dockChain.indexOf(draggedId) !== -1) {
                        var offsets = getChainOffsets();
                        var myOffset = offsets[draggedId] || 0;
                        var baseTop = newTop - myOffset;
                        for (var i = 0; i < dockChain.length; i++) {
                            var id = dockChain[i];
                            if (id === draggedId) continue;
                            var w = windows[id];
                            if (w) {
                                w.style.left = newLeft + "px";
                                w.style.top = (baseTop + offsets[id]) + "px";
                                w.style.right = "auto";
                            }
                        }
                    }
                }

                function onDragEnd(draggedId) {
                    var draggedEl = windows[draggedId];
                    if (!draggedEl) return;
                    var draggedRect = draggedEl.getBoundingClientRect();

                    // If already in a chain, check if another free window wants to join
                    if (dockChain.length >= 2 && dockChain.indexOf(draggedId) !== -1) {
                        // Check if any non-chained window is near the chain
                        var lastId = dockChain[dockChain.length - 1];
                        var lastEl = windows[lastId];
                        var firstId = dockChain[0];
                        var firstEl = windows[firstId];
                        if (!lastEl || !firstEl) return;
                        var lastRect = lastEl.getBoundingClientRect();
                        var firstRect = firstEl.getBoundingClientRect();

                        var ids = Object.keys(windows);
                        for (var i = 0; i < ids.length; i++) {
                            var id = ids[i];
                            if (dockChain.indexOf(id) !== -1) continue;
                            var el = windows[id];
                            if (!el || el.style.display === "none") continue;
                            var rect = el.getBoundingClientRect();
                            var leftDiff = Math.abs(rect.left - firstRect.left);
                            if (leftDiff > SNAP_THRESHOLD) continue;

                            // Check below chain
                            var belowGap = rect.top - lastRect.bottom;
                            if (belowGap >= -SNAP_THRESHOLD && belowGap <= SNAP_THRESHOLD) {
                                dockChain.push(id);
                                repositionChain();
                                return;
                            }
                            // Check above chain
                            var aboveGap = firstRect.top - rect.bottom;
                            if (aboveGap >= -SNAP_THRESHOLD && aboveGap <= SNAP_THRESHOLD) {
                                dockChain.unshift(id);
                                repositionChain();
                                return;
                            }
                        }
                        return;
                    }

                    // Not in a chain yet - check if dragged window docks with an existing chain
                    if (dockChain.length >= 2) {
                        var lastId = dockChain[dockChain.length - 1];
                        var lastEl = windows[lastId];
                        var firstId = dockChain[0];
                        var firstEl = windows[firstId];
                        if (lastEl && firstEl) {
                            var lastRect = lastEl.getBoundingClientRect();
                            var firstRect = firstEl.getBoundingClientRect();
                            var leftDiff = Math.abs(draggedRect.left - firstRect.left);
                            if (leftDiff <= SNAP_THRESHOLD) {
                                var belowGap = draggedRect.top - lastRect.bottom;
                                if (belowGap >= -SNAP_THRESHOLD && belowGap <= SNAP_THRESHOLD) {
                                    dockChain.push(draggedId);
                                    repositionChain();
                                    return;
                                }
                                var aboveGap = firstRect.top - draggedRect.bottom;
                                if (aboveGap >= -SNAP_THRESHOLD && aboveGap <= SNAP_THRESHOLD) {
                                    dockChain.unshift(draggedId);
                                    repositionChain();
                                    return;
                                }
                            }
                        }
                        return;
                    }

                    // No chain exists - check if dragged window can form a new pair
                    var ids = Object.keys(windows);
                    for (var i = 0; i < ids.length; i++) {
                        var id = ids[i];
                        if (id === draggedId) continue;
                        var el = windows[id];
                        if (!el || el.style.display === "none") continue;
                        var rect = el.getBoundingClientRect();
                        var leftDiff = Math.abs(draggedRect.left - rect.left);
                        if (leftDiff > SNAP_THRESHOLD) continue;

                        // Dragged is below target
                        var belowGap = draggedRect.top - rect.bottom;
                        if (belowGap >= -SNAP_THRESHOLD && belowGap <= SNAP_THRESHOLD) {
                            dockChain = [id, draggedId];
                            repositionChain();
                            return;
                        }
                        // Dragged is above target
                        var aboveGap = rect.top - draggedRect.bottom;
                        if (aboveGap >= -SNAP_THRESHOLD && aboveGap <= SNAP_THRESHOLD) {
                            dockChain = [draggedId, id];
                            repositionChain();
                            return;
                        }
                    }
                }

                return {
                    register: register,
                    unregister: unregister,
                    isDocked: isDocked,
                    dock: repositionChain,
                    undock: undock,
                    onDragMove: onDragMove,
                    onDragEnd: onDragEnd,
                    forceDock: function(ids) {
                        dockChain = ids.slice();
                        repositionChain();
                    },
                    clampAll: function() {
                        var ids = Object.keys(windows);
                        for (var i = 0; i < ids.length; i++) {
                            var el = windows[ids[i]];
                            if (!el || el.style.display === "none") continue;
                            var rect = el.getBoundingClientRect();
                            var vw = window.innerWidth;
                            var vh = window.innerHeight;
                            var newLeft = el.offsetLeft;
                            var newTop = el.offsetTop;
                            if (rect.right > vw) newLeft = vw - rect.width;
                            if (rect.bottom > vh - 32) newTop = vh - 32 - rect.height;
                            if (newLeft < 0) newLeft = 0;
                            if (newTop < 0) newTop = 0;
                            el.style.left = newLeft + "px";
                            el.style.top = newTop + "px";
                            el.style.right = "auto";
                        }
                    }
                };
            })();

            // Navigation tree data.
            // Leaf: { page: "..." }
            // Branch: { key: node, ... }
            // Branch with page: { page: "...", children: { key: node, ... } }
            const navData = {
                "Toys": {
                    page: "pages/toys.html",
                    children: {
                        "Gravitas": { page: "pages/toys001.html" },
                        "Ribbons": { page: "pages/toys002.html" },
                        "Orbit": { page: "pages/toys003.html" },
                        "Plane": { page: "pages/toys004.html" },
                        "Terrain": { page: "pages/toys005.html" },
                        "Waves": { page: "pages/toys006.html" },
                        "Glyphs": { page: "pages/toys007.html" },
                        "CMYK": { page: "pages/toys008.html" },
                        "Raft": { page: "pages/toys009.html" },
                        "Rope": { page: "pages/toys010.html" },
                        "Lines": { page: "pages/toys011.html" },
                        "Collab": { page: "pages/toys012.html" },
                    }
                },
                "Writing": {
                    page: "pages/writing.html",
                    children: {
                        "Loser's Game": { page: "pages/words001.html" },
                    }
                },
                "Projects": {
                    page: "pages/projects.html",
                    children: {
                        "Go": {
                            page: "pages/projects-go.html",
                            children: {
                                "juju": { page: "pages/juju.html" },
                                "convoy": { page: "pages/convoy.html" },
                                "spoke-d": { page: "pages/spoke-d.html" },
                                "snowy": { page: "pages/snowy.html" },
                                "coherence": { page: "pages/coherence.html" }
                            }
                        },
                        "Javascript": {
                            page: "pages/projects-js.html",
                            children: {
                                "fantasy land": { page: "pages/fantasyland.html" }
                            }
                        }
                    }
                },
                "About": {
                    page: "pages/about.html",
                    children: {
                        "Profile": { page: "pages/profile.html" },
                        "Links": { page: "pages/links.html" }
                    }
                }
            };

            function isLeaf(node) {
                return node && typeof node.page === "string" && !node.children;
            }

            function getChildren(node) {
                if (!node || typeof node !== "object") return null;
                if (node.children) return Object.keys(node.children);
                if (isLeaf(node)) return null;
                return Object.keys(node);
            }

            function getChild(node, key) {
                if (node.children) return node.children[key];
                return node[key];
            }

            // Build and render cascading selects.
            const container = document.getElementById("select-container");
            const breadcrumbEl = document.getElementById("breadcrumb");
            let currentPath = [];

            function updateBreadcrumb() {
                var trail = currentPath.join("/");
                breadcrumbEl.textContent = trail ? "#" + trail : "";
                if (trail) {
                    window.location.hash = trail;
                    document.title = "Simon Richardson / " + currentPath.join(" - ");
                } else {
                    history.replaceState(null, "", window.location.pathname);
                    document.title = "Simon Richardson";
                }
            }

            function renderSelects(path) {
                container.innerHTML = "";
                currentPath = [];

                let current = navData;
                const segments = path || [];

                // Render root select.
                appendSelect(current, 0);

                // Walk the path and render child selects.
                for (let i = 0; i < segments.length; i++) {
                    const key = segments[i];
                    var child = getChild(current, key);
                    if (!child) break;
                    current = child;
                    currentPath.push(key);

                    // Highlight the selected option in the previous select.
                    var prevSel = container.querySelectorAll("select")[i];
                    if (prevSel) prevSel.value = key;

                    if (isLeaf(current)) {
                        loadPage(current.page);
                        break;
                    }
                    // Only load branch page if this is the last segment.
                    if (current.page && i === segments.length - 1) loadPage(current.page);
                    appendSelect(current, i + 1);
                }

                updateBreadcrumb();

                // Focus the deepest select for keyboard accessibility.
                var allSelects = container.querySelectorAll("select");
                if (allSelects.length > 0) {
                    allSelects[allSelects.length - 1].focus();
                }
            }

            function appendSelect(node, depth) {
                const keys = getChildren(node);
                if (!keys) return;

                const sel = document.createElement("select");
                sel.setAttribute("size", "6");
                sel.className = "nav-select";
                sel.dataset.depth = depth;

                keys.forEach(function(key) {
                    const opt = document.createElement("option");
                    opt.value = key;
                    opt.textContent = key;
                    sel.appendChild(opt);
                });

                sel.addEventListener("change", function() {
                    onSelectChange(sel, node);
                });

                container.appendChild(sel);
            }

            function onSelectChange(sel, parentNode) {
                const depth = parseInt(sel.dataset.depth, 10);
                const selected = sel.value;
                const child = getChild(parentNode, selected);

                // Trim path to current depth and append new selection.
                currentPath = currentPath.slice(0, depth);
                currentPath.push(selected);

                // Remove all selects deeper than this one.
                const allSelects = container.querySelectorAll("select");
                allSelects.forEach(function(s) {
                    if (parseInt(s.dataset.depth, 10) > depth) {
                        container.removeChild(s);
                    }
                });

                if (isLeaf(child)) {
                    loadPage(child.page);
                } else if (child) {
                    if (child.page) loadPage(child.page);
                    appendSelect(child, depth + 1);
                }

                updateBreadcrumb();
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            }

            function loadPage(url) {
                // Stop any running canvas animation.
                if (window.__homeCanvasAnimId) {
                    cancelAnimationFrame(window.__homeCanvasAnimId);
                    window.__homeCanvasAnimId = null;
                }
                // Clean up page-specific resources (intervals, connections).
                if (window.__homeCanvasCleanup) {
                    window.__homeCanvasCleanup();
                    window.__homeCanvasCleanup = null;
                }
                // Unregister any fragment-owned windows from dock system.
                window.__dockSystem.unregister("settings");
                window.__currentPageUrl = url;

                var bg = document.getElementById("background-content");
                fetch(url)
                    .then(function(res) { return res.text(); })
                    .then(function(html) {
                        bg.innerHTML = html;
                        // Execute any script tags in the loaded fragment.
                        var scripts = bg.querySelectorAll("script");
                        scripts.forEach(function(oldScript) {
                            var newScript = document.createElement("script");
                            newScript.textContent = oldScript.textContent;
                            oldScript.parentNode.replaceChild(newScript, oldScript);
                        });
                        // Restore saved settings for this page.
                        restorePageSettings();
                        // Clamp all panels on screen after restore.
                        setTimeout(function() {
                            if (window.__dockSystem) window.__dockSystem.clampAll();
                        }, 50);
                        // Auto-save settings on any input change.
                        var panel = document.getElementById("settings-body");
                        if (panel) {
                            panel.addEventListener("input", savePageSettings);
                            panel.addEventListener("change", savePageSettings);
                        }
                    })
                    .catch(function() { bg.innerHTML = "<p>Failed to load content.</p>"; });
            }

            // Initialize: restore from hash or load random toy.
            // Pick a random toy page from the "Toys" branch.
            function randomHomePage() {
                var toysNode = navData["Toys"];
                var children = toysNode.children;
                var keys = Object.keys(children);
                var chosen = keys[Math.floor(Math.random() * keys.length)];
                return { page: children[chosen].page, path: ["Toys", chosen] };
            }

            (function() {
                var hash = decodeURIComponent(window.location.hash.replace(/^#/, ""));
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    var home = randomHomePage();
                    renderSelects(home.path);
                    loadPage(home.page);
                }
            })();

            window.addEventListener("hashchange", function() {
                var hash = decodeURIComponent(window.location.hash.replace(/^#/, ""));
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    var home = randomHomePage();
                    renderSelects(home.path);
                    loadPage(home.page);
                }
            });

            // Footer nav-link click handler.
            document.querySelectorAll("#bottom-bar a[data-page]").forEach(function(link) {
                link.addEventListener("click", function(e) {
                    e.preventDefault();
                    loadPage(link.getAttribute("data-page"));
                });
            });

            // --- Cookie persistence for background color, window positions, and page settings ---
            var currentBgColor = "#1d1d1d";
            function setCookie(name, value, days) {
                var expires = "";
                if (days) {
                    var d = new Date();
                    d.setTime(d.getTime() + days * 86400000);
                    expires = "; expires=" + d.toUTCString();
                }
                document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
            }
            function getCookie(name) {
                var match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
                return match ? decodeURIComponent(match[2]) : null;
            }
            window.__windowPositions = {};
            window.__pageSettings = {};
            function savePrefs() {
                var positions = {};
                var allWins = document.querySelectorAll(".win-window");
                for (var i = 0; i < allWins.length; i++) {
                    var el = allWins[i];
                    if (el.style.display === "none") continue;
                    var id = null;
                    if (el.id === "nav-window") id = "navigator";
                    else if (el.id === "prefs-window") id = "prefs";
                    else if (el.id === "color-window") id = "color";
                    else if (el.id === "settings-panel") id = "settings";
                    if (id) {
                        positions[id] = { left: el.offsetLeft, top: el.offsetTop };
                    }
                }
                var prefs = {
                    bgColor: currentBgColor,
                    darkMode: document.body.classList.contains("dark-mode"),
                    windowPositions: positions,
                    pageSettings: window.__pageSettings || {}
                };
                setCookie("sitePrefs", JSON.stringify(prefs), 365);
            }
            var __restoringSettings = false;
            function restorePageSettings() {
                var page = window.__currentPageUrl;
                if (!page || !window.__pageSettings || !window.__pageSettings[page]) return;
                __restoringSettings = true;
                var values = window.__pageSettings[page];
                for (var id in values) {
                    var inp = document.getElementById(id);
                    if (!inp) continue;
                    if (inp.type === "file") continue;
                    if (inp.type === "checkbox") {
                        inp.checked = values[id];
                    } else {
                        inp.value = values[id];
                    }
                    inp.dispatchEvent(new Event("input", { bubbles: true }));
                    inp.dispatchEvent(new Event("change", { bubbles: true }));
                }
                var applyBtn = document.getElementById("setting-apply");
                if (applyBtn) applyBtn.click();
                __restoringSettings = false;
            }
            function savePageSettings() {
                if (__restoringSettings) return;
                var panel = document.getElementById("settings-body");
                if (!panel) return;
                var page = window.__currentPageUrl;
                if (!page) return;
                var inputs = panel.querySelectorAll("input[id^='setting-']");
                var values = {};
                for (var i = 0; i < inputs.length; i++) {
                    var inp = inputs[i];
                    if (inp.type === "file") continue;
                    if (inp.type === "checkbox") {
                        values[inp.id] = inp.checked;
                    } else {
                        values[inp.id] = inp.value;
                    }
                }
                if (!window.__pageSettings) window.__pageSettings = {};
                window.__pageSettings[page] = values;
                savePrefs();
            }
            function loadPrefs() {
                var raw = getCookie("sitePrefs");
                if (!raw) return;
                try {
                    var prefs = JSON.parse(raw);
                    if (prefs.bgColor) {
                        currentBgColor = prefs.bgColor;
                        document.body.style.backgroundColor = prefs.bgColor;
                        document.getElementById("color-preview").style.backgroundColor = prefs.bgColor;
                    }
                    if (prefs.darkMode) {
                        document.body.classList.add("dark-mode");
                    }
                    if (prefs.windowPositions) {
                        window.__windowPositions = prefs.windowPositions;
                    }
                    if (prefs.navLeft != null && !prefs.windowPositions) {
                        window.__windowPositions.navigator = { left: prefs.navLeft, top: prefs.navTop };
                    }
                    if (prefs.setLeft != null && !prefs.windowPositions) {
                        window.__windowPositions.settings = { left: prefs.setLeft, top: prefs.setTop };
                    }
                    if (prefs.pageSettings) {
                        window.__pageSettings = prefs.pageSettings;
                    }
                } catch(e) {}
            }
            loadPrefs();

            // --- makeDraggable: shared helper for all windows ---
            window.makeDraggable = function(dockId, winEl, trackEl) {
                var dragging = false;
                var offsetX = 0;
                var offsetY = 0;

                window.__dockSystem.register(dockId, winEl);

                // Restore saved position if available.
                var positions = window.__windowPositions || {};
                if (positions[dockId]) {
                    winEl.style.left = positions[dockId].left + "px";
                    winEl.style.top = positions[dockId].top + "px";
                    winEl.style.right = "auto";
                    winEl.style.bottom = "auto";
                }

                trackEl.addEventListener("mousedown", function(e) {
                    dragging = true;
                    var currentTop = winEl.offsetTop;
                    var currentLeft = winEl.offsetLeft;
                    winEl.style.bottom = "auto";
                    winEl.style.right = "auto";
                    winEl.style.top = currentTop + "px";
                    winEl.style.left = currentLeft + "px";
                    offsetX = e.clientX - currentLeft;
                    offsetY = e.clientY - currentTop;
                    e.preventDefault();
                });

                document.addEventListener("mousemove", function(e) {
                    if (!dragging) return;
                    window.__dockSystem.onDragMove(dockId, e.clientX - offsetX, e.clientY - offsetY);
                });

                document.addEventListener("mouseup", function() {
                    if (dragging) window.__dockSystem.onDragEnd(dockId);
                    dragging = false;
                });

                trackEl.addEventListener("touchstart", function(e) {
                    dragging = true;
                    var currentTop = winEl.offsetTop;
                    var currentLeft = winEl.offsetLeft;
                    winEl.style.bottom = "auto";
                    winEl.style.right = "auto";
                    winEl.style.top = currentTop + "px";
                    winEl.style.left = currentLeft + "px";
                    var touch = e.touches[0];
                    offsetX = touch.clientX - currentLeft;
                    offsetY = touch.clientY - currentTop;
                    e.preventDefault();
                });

                document.addEventListener("touchmove", function(e) {
                    if (!dragging) return;
                    var touch = e.touches[0];
                    window.__dockSystem.onDragMove(dockId, touch.clientX - offsetX, touch.clientY - offsetY);
                });

                document.addEventListener("touchend", function() {
                    if (dragging) window.__dockSystem.onDragEnd(dockId);
                    dragging = false;
                });
            };

            // Register and make nav window draggable.
            (function() {
                var win = document.getElementById("nav-window");
                var track = document.getElementById("grab-track");
                window.makeDraggable("navigator", win, track);
                // Convert from bottom-anchored to top-anchored positioning immediately.
                var initTop = win.offsetTop;
                var initLeft = win.offsetLeft;
                win.style.bottom = "auto";
                win.style.top = initTop + "px";
                win.style.left = initLeft + "px";
            })();

            // Register and make prefs window draggable.
            window.makeDraggable("prefs", document.getElementById("prefs-window"), document.getElementById("prefs-grab-track"));

            // Register and make color picker window draggable.
            window.makeDraggable("color", document.getElementById("color-window"), document.getElementById("color-grab-track"));

            // Keep windows visible on browser resize.
            window.addEventListener("resize", function() {
                window.__dockSystem.clampAll();
            });

            // Window controls.
            document.getElementById("window-minimize").addEventListener("click", function() {
                const body = document.getElementById("window-body");
                body.style.display = body.style.display === "none" ? "flex" : "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });

            document.getElementById("window-toggle-breadcrumb").addEventListener("click", function() {
                const bc = document.getElementById("breadcrumb");
                bc.style.display = bc.style.display === "none" ? "block" : "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });

            // Background color picker - Win95 palette window
            var colorPalette = [
                "#000000", "#800000", "#008000", "#808000", "#000080", "#800080", "#008080", "#c0c0c0",
                "#808080", "#ff0000", "#00ff00", "#ffff00", "#0000ff", "#ff00ff", "#00ffff", "#ffffff",
                "#1d1d1d", "#2d2d2d", "#3d3d3d", "#4d4d4d", "#5d5d5d", "#6d6d6d", "#7d7d7d", "#8d8d8d",
                "#330000", "#663300", "#336600", "#003300", "#003366", "#000066", "#330066", "#660066",
                "#660000", "#996633", "#669900", "#006633", "#006699", "#000099", "#660099", "#990066",
                "#990000", "#cc9900", "#99cc00", "#009966", "#0099cc", "#0000cc", "#9900cc", "#cc0066",
                "#cc3300", "#ffcc00", "#ccff33", "#33cc66", "#33ccff", "#3366ff", "#cc33ff", "#ff3399"
            ];
            var paletteEl = document.getElementById("color-palette");
            for (var i = 0; i < colorPalette.length; i++) {
                var swatch = document.createElement("div");
                swatch.className = "color-swatch";
                swatch.style.backgroundColor = colorPalette[i];
                swatch.dataset.color = colorPalette[i];
                swatch.addEventListener("click", function() {
                    currentBgColor = this.dataset.color;
                    document.body.style.backgroundColor = currentBgColor;
                    document.getElementById("color-preview").style.backgroundColor = currentBgColor;
                    savePrefs();
                });
                paletteEl.appendChild(swatch);
            }
            document.getElementById("color-preview").style.backgroundColor = currentBgColor;

            // Prefs window toggle
            document.getElementById("window-settings").addEventListener("click", function() {
                var pw = document.getElementById("prefs-window");
                pw.style.display = pw.style.display === "none" ? "flex" : "none";
            });
            document.getElementById("prefs-minimize").addEventListener("click", function() {
                var body = document.getElementById("prefs-window-body");
                body.style.display = body.style.display === "none" ? "flex" : "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });
            document.getElementById("pref-bgcolor").addEventListener("click", function() {
                var cw = document.getElementById("color-window");
                cw.style.display = cw.style.display === "none" ? "flex" : "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });
            document.getElementById("color-minimize").addEventListener("click", function() {
                var body = document.getElementById("color-window-body");
                body.style.display = body.style.display === "none" ? "block" : "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });
            document.getElementById("prefs-close").addEventListener("click", function() {
                document.getElementById("prefs-window").style.display = "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });
            document.getElementById("color-close").addEventListener("click", function() {
                document.getElementById("color-window").style.display = "none";
                setTimeout(function() { window.__dockSystem.dock(); }, 0);
            });
            document.getElementById("pref-clear-cookies").addEventListener("click", function() {
                document.cookie = "sitePrefs=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.body.style.backgroundColor = "#1d1d1d";
                currentBgColor = "#1d1d1d";
                document.getElementById("color-preview").style.backgroundColor = currentBgColor;
            });

            // Undock buttons - all buttons with class dock-undock-btn trigger undock.
            document.addEventListener("click", function(e) {
                if (e.target.classList.contains("dock-undock-btn")) {
                    window.__dockSystem.undock();
                }
            });

            // Dark mode toggle.
            document.getElementById("dark-mode-toggle").addEventListener("click", function() {
                document.body.classList.toggle("dark-mode");
                savePrefs();
            });

            // Save positions on drag end
            document.addEventListener("mouseup", function() { setTimeout(savePrefs, 50); });
            document.addEventListener("touchend", function() { setTimeout(savePrefs, 50); });

            // --- Keyboard accessibility: cycle between windows with F6 ---
            document.addEventListener("keydown", function(e) {
                if (e.key === "F6") {
                    e.preventDefault();
                    var allWindows = document.querySelectorAll(".win-window[tabindex]");
                    var visible = [];
                    allWindows.forEach(function(w) {
                        if (w.style.display !== "none" && w.offsetParent !== null) {
                            visible.push(w);
                        }
                    });
                    if (visible.length === 0) return;

                    // Find currently focused window.
                    var active = document.activeElement;
                    var currentIdx = -1;
                    for (var i = 0; i < visible.length; i++) {
                        if (visible[i] === active || visible[i].contains(active)) {
                            currentIdx = i;
                            break;
                        }
                    }

                    var nextIdx = e.shiftKey
                        ? (currentIdx <= 0 ? visible.length - 1 : currentIdx - 1)
                        : (currentIdx + 1) % visible.length;
                    visible[nextIdx].focus();
                }
            });

        </script>
    </body>
</html>
