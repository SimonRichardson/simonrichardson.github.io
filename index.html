<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Simon Richardson</title>
        <meta charset="utf-8">
        <meta name="description" content="Simon Richardson, Software Engineer">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="background-content">
            <canvas id="home-canvas"></canvas>
        </div>

        <footer id="bottom-bar">
            <span>Simon Richardson &copy; 2024</span>
            <span class="bar-links">
                <a href="https://github.com/SimonRichardson">github</a>
                <a href="https://hachyderm.io/@simonrichardson">mastodon</a>
                <button id="dark-mode-toggle" title="Toggle dark mode">&#128161;</button>
            </span>
        </footer>

        <div id="win95-window">
            <div id="window-grab">
                <button id="window-minimize" title="Minimize">_</button>
                <div id="grab-track"></div>
                <button id="window-toggle-breadcrumb" title="Toggle breadcrumb">...</button>
            </div>
            <div id="window-chrome">
                <div id="window-body">
                    <div id="select-container"></div>
                    <div id="breadcrumb"></div>
                </div>
            </div>
        </div>

        <script>
            // Navigation tree data.
            // Each node is either a branch (children object) or a leaf (page string).
            const navData = {
                "Home": { page: "__home__" },
                "Projects": {
                    "Go": {
                        "juju": { page: "pages/juju.html" },
                        "convoy": { page: "pages/convoy.html" },
                        "spoke-d": { page: "pages/spoke-d.html" },
                        "snowy": { page: "pages/snowy.html" },
                        "coherence": { page: "pages/coherence.html" }
                    },
                    "Javascript": {
                        "fantasy land": { page: "pages/fantasyland.html" }
                    }
                },
                "About": {
                    "Profile": { page: "pages/profile.html" },
                    "Links": { page: "pages/links.html" }
                }
            };

            function isLeaf(node) {
                return node && typeof node.page === "string";
            }

            function getChildren(node) {
                if (!node || isLeaf(node)) return null;
                return Object.keys(node);
            }

            // Build and render cascading selects.
            const container = document.getElementById("select-container");
            const breadcrumbEl = document.getElementById("breadcrumb");
            let currentPath = [];

            function updateBreadcrumb() {
                var trail = currentPath.join("/");
                breadcrumbEl.textContent = trail ? "#" + trail : "";
                if (trail) {
                    window.location.hash = trail;
                } else {
                    history.replaceState(null, "", window.location.pathname);
                }
            }

            function renderSelects(path) {
                container.innerHTML = "";
                currentPath = [];

                let current = navData;
                const segments = path || [];

                // Render root select.
                appendSelect(current, 0);

                // Walk the path and render child selects.
                for (let i = 0; i < segments.length; i++) {
                    const key = segments[i];
                    if (!current[key]) break;
                    current = current[key];
                    currentPath.push(key);

                    // Highlight the selected option in the previous select.
                    var prevSel = container.querySelectorAll("select")[i];
                    if (prevSel) prevSel.value = key;

                    if (isLeaf(current)) {
                        loadPage(current.page);
                        break;
                    }
                    appendSelect(current, i + 1);
                }

                updateBreadcrumb();
            }

            function appendSelect(node, depth) {
                const keys = getChildren(node);
                if (!keys) return;

                const sel = document.createElement("select");
                sel.setAttribute("size", "6");
                sel.className = "win95-select";
                sel.dataset.depth = depth;

                keys.forEach(function(key) {
                    const opt = document.createElement("option");
                    opt.value = key;
                    opt.textContent = key;
                    sel.appendChild(opt);
                });

                sel.addEventListener("change", function() {
                    onSelectChange(sel, node);
                });

                container.appendChild(sel);
            }

            function onSelectChange(sel, parentNode) {
                const depth = parseInt(sel.dataset.depth, 10);
                const selected = sel.value;
                const child = parentNode[selected];

                // Trim path to current depth and append new selection.
                currentPath = currentPath.slice(0, depth);
                currentPath.push(selected);

                // Remove all selects deeper than this one.
                const allSelects = container.querySelectorAll("select");
                allSelects.forEach(function(s) {
                    if (parseInt(s.dataset.depth, 10) > depth) {
                        container.removeChild(s);
                    }
                });

                if (isLeaf(child)) {
                    loadPage(child.page);
                } else if (child) {
                    appendSelect(child, depth + 1);
                }

                updateBreadcrumb();
            }

            function loadPage(url) {
                if (url === "__home__") {
                    restoreCanvas();
                    return;
                }
                stopCanvas();
                const bg = document.getElementById("background-content");
                fetch(url)
                    .then(function(res) { return res.text(); })
                    .then(function(html) { bg.innerHTML = html; })
                    .catch(function() { bg.innerHTML = "<p>Failed to load content.</p>"; });
            }

            function restoreCanvas() {
                const bg = document.getElementById("background-content");
                bg.innerHTML = '<canvas id="home-canvas"></canvas>';
                startCanvas();
            }

            // Initialize: restore from hash or show root.
            (function() {
                var hash = window.location.hash.replace(/^#/, "");
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    renderSelects();
                    startCanvas();
                }
            })();

            window.addEventListener("hashchange", function() {
                var hash = window.location.hash.replace(/^#/, "");
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    renderSelects();
                    restoreCanvas();
                }
            });

            // --- Interactive canvas simulation ---
            var canvasAnimId = null;

            function stopCanvas() {
                if (canvasAnimId) {
                    cancelAnimationFrame(canvasAnimId);
                    canvasAnimId = null;
                }
            }

            function startCanvas() {
                stopCanvas();

                var canvas = document.getElementById("home-canvas");
                if (!canvas) return;
                var ctx = canvas.getContext("2d");

                function resize() {
                    canvas.width = canvas.parentElement.clientWidth;
                    canvas.height = canvas.parentElement.clientHeight;
                }
                resize();
                window.addEventListener("resize", resize);

                var NUM_VERTICES = 24;
                var circles = [];
                var numCircles = 20;

                function createCircle(x, y, r) {
                    var verts = [];
                    for (var k = 0; k < NUM_VERTICES; k++) {
                        var angle = (k / NUM_VERTICES) * Math.PI * 2;
                        verts.push({
                            ox: Math.cos(angle) * r,
                            oy: Math.sin(angle) * r,
                            x: Math.cos(angle) * r,
                            y: Math.sin(angle) * r,
                            vx: 0,
                            vy: 0
                        });
                    }
                    return {
                        x: x,
                        y: y,
                        r: r,
                        mass: r * r * r,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        verts: verts
                    };
                }

                for (var i = 0; i < numCircles; i++) {
                    var r = 60 + Math.random() * 40;
                    circles.push(createCircle(
                        Math.random() * canvas.width,
                        Math.random() * canvas.height,
                        r
                    ));
                }

                var dragged = null;
                var dragOffX = 0;
                var dragOffY = 0;

                canvas.addEventListener("mousedown", function(e) {
                    var rect = canvas.getBoundingClientRect();
                    var mx = e.clientX - rect.left;
                    var my = e.clientY - rect.top;
                    for (var i = circles.length - 1; i >= 0; i--) {
                        var c = circles[i];
                        var dx = mx - c.x;
                        var dy = my - c.y;
                        if (dx * dx + dy * dy <= c.r * c.r) {
                            dragged = c;
                            dragOffX = dx;
                            dragOffY = dy;
                            c.vx = 0;
                            c.vy = 0;
                            break;
                        }
                    }
                });

                canvas.addEventListener("mousemove", function(e) {
                    if (!dragged) return;
                    var rect = canvas.getBoundingClientRect();
                    dragged.x = e.clientX - rect.left - dragOffX;
                    dragged.y = e.clientY - rect.top - dragOffY;
                });

                canvas.addEventListener("mouseup", function() {
                    dragged = null;
                });

                canvas.addEventListener("touchstart", function(e) {
                    var rect = canvas.getBoundingClientRect();
                    var t = e.touches[0];
                    var mx = t.clientX - rect.left;
                    var my = t.clientY - rect.top;
                    for (var i = circles.length - 1; i >= 0; i--) {
                        var c = circles[i];
                        var dx = mx - c.x;
                        var dy = my - c.y;
                        if (dx * dx + dy * dy <= c.r * c.r) {
                            dragged = c;
                            dragOffX = dx;
                            dragOffY = dy;
                            c.vx = 0;
                            c.vy = 0;
                            e.preventDefault();
                            break;
                        }
                    }
                });

                canvas.addEventListener("touchmove", function(e) {
                    if (!dragged) return;
                    var rect = canvas.getBoundingClientRect();
                    var t = e.touches[0];
                    dragged.x = t.clientX - rect.left - dragOffX;
                    dragged.y = t.clientY - rect.top - dragOffY;
                    e.preventDefault();
                });

                canvas.addEventListener("touchend", function() {
                    dragged = null;
                });

                function update() {
                    var w = canvas.width;
                    var h = canvas.height;

                    // Move circles.
                    for (var i = 0; i < circles.length; i++) {
                        var a = circles[i];
                        if (a === dragged) continue;

                        a.x += a.vx;
                        a.y += a.vy;

                        // Wrap around edges.
                        if (a.x < -a.r) a.x = w + a.r;
                        else if (a.x > w + a.r) a.x = -a.r;
                        if (a.y < -a.r) a.y = h + a.r;
                        else if (a.y > h + a.r) a.y = -a.r;
                    }

                    // Collision detection — push vertices inward at impact.
                    for (var i = 0; i < circles.length; i++) {
                        for (var j = i + 1; j < circles.length; j++) {
                            var a = circles[i];
                            var b = circles[j];
                            var dx = b.x - a.x;
                            var dy = b.y - a.y;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            var minDist = a.r + b.r;

                            if (dist < minDist && dist > 0) {
                                var nx = dx / dist;
                                var ny = dy / dist;
                                var overlap = minDist - dist;
                                var totalMass = a.mass + b.mass;

                                // Separate bodies.
                                a.x -= nx * overlap * (b.mass / totalMass);
                                a.y -= ny * overlap * (b.mass / totalMass);
                                b.x += nx * overlap * (a.mass / totalMass);
                                b.y += ny * overlap * (a.mass / totalMass);

                                // Elastic collision impulse.
                                if (a !== dragged && b !== dragged) {
                                    var dvx = a.vx - b.vx;
                                    var dvy = a.vy - b.vy;
                                    var dvDotN = dvx * nx + dvy * ny;
                                    if (dvDotN > 0) {
                                        var impulse = (2 * dvDotN) / totalMass;
                                        a.vx -= impulse * b.mass * nx;
                                        a.vy -= impulse * b.mass * ny;
                                        b.vx += impulse * a.mass * nx;
                                        b.vy += impulse * a.mass * ny;
                                    }
                                }

                                // Deform vertices near impact — push them concave.
                                var impactStrength = Math.min(overlap * 2.5, a.r * 0.55);

                                // Deform circle A toward B.
                                deformVertices(a, nx, ny, impactStrength * (b.mass / totalMass));
                                // Deform circle B toward A.
                                var impactStrengthB = Math.min(overlap * 2.5, b.r * 0.55);
                                deformVertices(b, -nx, -ny, impactStrengthB * (a.mass / totalMass));
                            }
                        }
                    }

                    // Spring vertices back to rest position.
                    var stiffness = 0.18;
                    var damping = 0.75;
                    var maxVel = 5.0;
                    for (var i = 0; i < circles.length; i++) {
                        var c = circles[i];
                        var minDist = c.r * 0.4;
                        for (var k = 0; k < c.verts.length; k++) {
                            var v = c.verts[k];
                            var fx = (v.ox - v.x) * stiffness;
                            var fy = (v.oy - v.y) * stiffness;
                            v.vx = (v.vx + fx) * damping;
                            v.vy = (v.vy + fy) * damping;

                            // Cap vertex velocity.
                            var vel = Math.sqrt(v.vx * v.vx + v.vy * v.vy);
                            if (vel > maxVel) {
                                v.vx = (v.vx / vel) * maxVel;
                                v.vy = (v.vy / vel) * maxVel;
                            }

                            v.x += v.vx;
                            v.y += v.vy;

                            // Clamp: never let vertex past 60% inward toward center.
                            var d = Math.sqrt(v.x * v.x + v.y * v.y);
                            if (d < minDist) {
                                v.x = (v.x / d) * minDist;
                                v.y = (v.y / d) * minDist;
                                v.vx = 0;
                                v.vy = 0;
                            }
                        }
                    }
                }

                function deformVertices(circle, nx, ny, strength) {
                    for (var k = 0; k < circle.verts.length; k++) {
                        var v = circle.verts[k];
                        // How much this vertex faces the impact direction.
                        var len = Math.sqrt(v.ox * v.ox + v.oy * v.oy);
                        if (len === 0) continue;
                        var vnx = v.ox / len;
                        var vny = v.oy / len;
                        var dot = vnx * nx + vny * ny;

                        // Only affect vertices facing the collision.
                        if (dot > 0) {
                            var influence = dot * dot;
                            // Push vertex inward (toward center) creating concavity.
                            v.vx -= vnx * strength * influence;
                            v.vy -= vny * strength * influence;
                        }
                    }
                }

                function draw() {
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    for (var i = 0; i < circles.length; i++) {
                        var c = circles[i];
                        ctx.save();
                        ctx.translate(c.x, c.y);
                        ctx.beginPath();

                        // Draw smooth curve through deformed vertices.
                        var verts = c.verts;
                        var n = verts.length;
                        for (var k = 0; k < n; k++) {
                            var curr = verts[k];
                            var next = verts[(k + 1) % n];
                            var cpx = (curr.x + next.x) / 2;
                            var cpy = (curr.y + next.y) / 2;
                            if (k === 0) {
                                var prev = verts[n - 1];
                                ctx.moveTo((prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
                            }
                            ctx.quadraticCurveTo(curr.x, curr.y, cpx, cpy);
                        }
                        ctx.closePath();
                        ctx.fillStyle = "#000000";
                        ctx.fill();
                        ctx.restore();
                    }
                }

                function loop() {
                    update();
                    draw();
                    canvasAnimId = requestAnimationFrame(loop);
                }

                loop();
            }

            // Draggable window via grab track.
            (function() {
                const win = document.getElementById("win95-window");
                const track = document.getElementById("grab-track");
                let dragging = false;
                let offsetX = 0;
                let offsetY = 0;

                track.addEventListener("mousedown", function(e) {
                    dragging = true;
                    offsetX = e.clientX - win.offsetLeft;
                    offsetY = e.clientY - win.offsetTop;
                    e.preventDefault();
                });

                document.addEventListener("mousemove", function(e) {
                    if (!dragging) return;
                    win.style.left = (e.clientX - offsetX) + "px";
                    win.style.top = (e.clientY - offsetY) + "px";
                });

                document.addEventListener("mouseup", function() {
                    dragging = false;
                });

                // Touch support.
                track.addEventListener("touchstart", function(e) {
                    dragging = true;
                    const touch = e.touches[0];
                    offsetX = touch.clientX - win.offsetLeft;
                    offsetY = touch.clientY - win.offsetTop;
                    e.preventDefault();
                });

                document.addEventListener("touchmove", function(e) {
                    if (!dragging) return;
                    const touch = e.touches[0];
                    win.style.left = (touch.clientX - offsetX) + "px";
                    win.style.top = (touch.clientY - offsetY) + "px";
                });

                document.addEventListener("touchend", function() {
                    dragging = false;
                });
            })();

            // Window controls.
            document.getElementById("window-minimize").addEventListener("click", function() {
                const body = document.getElementById("window-body");
                body.style.display = body.style.display === "none" ? "flex" : "none";
            });

            document.getElementById("window-toggle-breadcrumb").addEventListener("click", function() {
                const bc = document.getElementById("breadcrumb");
                bc.style.display = bc.style.display === "none" ? "block" : "none";
            });

            // Dark mode toggle.
            document.getElementById("dark-mode-toggle").addEventListener("click", function() {
                document.body.classList.toggle("dark-mode");
            });
        </script>
    </body>
</html>
