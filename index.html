<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Simon Richardson</title>
        <meta charset="utf-8">
        <meta name="description" content="Simon Richardson, Software Engineer">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="background-content">
            <canvas id="home-canvas"></canvas>
        </div>

        <footer id="bottom-bar">
            <span>Simon Richardson &copy; 2024</span>
            <span class="bar-links">
                <a href="https://github.com/SimonRichardson">github</a>
                <a href="https://hachyderm.io/@simonrichardson">mastodon</a>
                <button id="dark-mode-toggle" title="Toggle dark mode">&#128161;</button>
            </span>
        </footer>

        <div id="win95-window">
            <div id="window-grab">
                <button id="window-minimize" title="Minimize">_</button>
                <div id="grab-track"></div>
                <button id="window-toggle-breadcrumb" title="Toggle breadcrumb">...</button>
            </div>
            <div id="window-chrome">
                <div id="window-body">
                    <div id="select-container"></div>
                    <div id="breadcrumb"></div>
                </div>
            </div>
        </div>

        <script>
            // Navigation tree data.
            // Each node is either a branch (children object) or a leaf (page string).
            const navData = {
                "Home": { page: "__home__" },
                "Projects": {
                    "Go": {
                        "juju": { page: "pages/juju.html" },
                        "convoy": { page: "pages/convoy.html" },
                        "spoke-d": { page: "pages/spoke-d.html" },
                        "snowy": { page: "pages/snowy.html" },
                        "coherence": { page: "pages/coherence.html" }
                    },
                    "Javascript": {
                        "fantasy land": { page: "pages/fantasyland.html" }
                    }
                },
                "About": {
                    "Profile": { page: "pages/profile.html" },
                    "Links": { page: "pages/links.html" }
                }
            };

            function isLeaf(node) {
                return node && typeof node.page === "string";
            }

            function getChildren(node) {
                if (!node || isLeaf(node)) return null;
                return Object.keys(node);
            }

            // Build and render cascading selects.
            const container = document.getElementById("select-container");
            const breadcrumbEl = document.getElementById("breadcrumb");
            let currentPath = [];

            function updateBreadcrumb() {
                var trail = currentPath.join("/");
                breadcrumbEl.textContent = trail ? "#" + trail : "";
                if (trail) {
                    window.location.hash = trail;
                } else {
                    history.replaceState(null, "", window.location.pathname);
                }
            }

            function renderSelects(path) {
                container.innerHTML = "";
                currentPath = [];

                let current = navData;
                const segments = path || [];

                // Render root select.
                appendSelect(current, 0);

                // Walk the path and render child selects.
                for (let i = 0; i < segments.length; i++) {
                    const key = segments[i];
                    if (!current[key]) break;
                    current = current[key];
                    currentPath.push(key);

                    // Highlight the selected option in the previous select.
                    var prevSel = container.querySelectorAll("select")[i];
                    if (prevSel) prevSel.value = key;

                    if (isLeaf(current)) {
                        loadPage(current.page);
                        break;
                    }
                    appendSelect(current, i + 1);
                }

                updateBreadcrumb();
            }

            function appendSelect(node, depth) {
                const keys = getChildren(node);
                if (!keys) return;

                const sel = document.createElement("select");
                sel.setAttribute("size", "6");
                sel.className = "win95-select";
                sel.dataset.depth = depth;

                keys.forEach(function(key) {
                    const opt = document.createElement("option");
                    opt.value = key;
                    opt.textContent = key;
                    sel.appendChild(opt);
                });

                sel.addEventListener("change", function() {
                    onSelectChange(sel, node);
                });

                container.appendChild(sel);
            }

            function onSelectChange(sel, parentNode) {
                const depth = parseInt(sel.dataset.depth, 10);
                const selected = sel.value;
                const child = parentNode[selected];

                // Trim path to current depth and append new selection.
                currentPath = currentPath.slice(0, depth);
                currentPath.push(selected);

                // Remove all selects deeper than this one.
                const allSelects = container.querySelectorAll("select");
                allSelects.forEach(function(s) {
                    if (parseInt(s.dataset.depth, 10) > depth) {
                        container.removeChild(s);
                    }
                });

                if (isLeaf(child)) {
                    loadPage(child.page);
                } else if (child) {
                    appendSelect(child, depth + 1);
                }

                updateBreadcrumb();
            }

            function loadPage(url) {
                if (url === "__home__") {
                    restoreCanvas();
                    return;
                }
                stopCanvas();
                const bg = document.getElementById("background-content");
                fetch(url)
                    .then(function(res) { return res.text(); })
                    .then(function(html) { bg.innerHTML = html; })
                    .catch(function() { bg.innerHTML = "<p>Failed to load content.</p>"; });
            }

            function restoreCanvas() {
                const bg = document.getElementById("background-content");
                bg.innerHTML = '<canvas id="home-canvas"></canvas>';
                startCanvas();
            }

            // Initialize: restore from hash or show root.
            (function() {
                var hash = window.location.hash.replace(/^#/, "");
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    renderSelects();
                    startCanvas();
                }
            })();

            window.addEventListener("hashchange", function() {
                var hash = window.location.hash.replace(/^#/, "");
                if (hash) {
                    renderSelects(hash.split("/"));
                } else {
                    renderSelects();
                    restoreCanvas();
                }
            });

            // --- Interactive canvas simulation ---
            var canvasAnimId = null;

            function stopCanvas() {
                if (canvasAnimId) {
                    cancelAnimationFrame(canvasAnimId);
                    canvasAnimId = null;
                }
            }

            function startCanvas() {
                stopCanvas();

                var canvas = document.getElementById("home-canvas");
                if (!canvas) return;
                var ctx = canvas.getContext("2d");

                function resize() {
                    canvas.width = canvas.parentElement.clientWidth;
                    canvas.height = canvas.parentElement.clientHeight;
                }
                resize();
                window.addEventListener("resize", resize);

                function Ball(r, px, py, vAngle, vLen) {
                    this.radius = r;
                    this.x = px;
                    this.y = py;
                    this.vx = Math.cos(vAngle) * vLen;
                    this.vy = Math.sin(vAngle) * vLen;
                    this.maxVec = 15;
                    this.numSegment = Math.floor(r / 3 + 2);
                    this.boundOffset = [];
                    this.boundOffsetBuff = [];
                    this.sidePoints = [];

                    for (var i = 0; i < this.numSegment; i++) {
                        this.boundOffset.push(this.radius);
                        this.boundOffsetBuff.push(this.radius);
                        var angle = (2 * Math.PI / this.numSegment) * i;
                        this.sidePoints.push({ x: Math.cos(angle), y: Math.sin(angle) });
                    }
                }

                Ball.prototype.iterate = function() {
                    this.checkBorders();
                    var vecLen = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (vecLen > this.maxVec) {
                        this.vx = (this.vx / vecLen) * this.maxVec;
                        this.vy = (this.vy / vecLen) * this.maxVec;
                    }
                    this.x += this.vx;
                    this.y += this.vy;
                    this.updateShape();
                };

                Ball.prototype.checkBorders = function() {
                    var w = canvas.width;
                    var h = canvas.height;
                    if (this.x < -this.radius) this.x = w + this.radius;
                    if (this.x > w + this.radius) this.x = -this.radius;
                    if (this.y < -this.radius) this.y = h + this.radius;
                    if (this.y > h + this.radius) this.y = -this.radius;
                };

                Ball.prototype.updateShape = function() {
                    for (var i = 0; i < this.numSegment; i++) {
                        if (this.boundOffset[i] < this.radius / 4)
                            this.boundOffset[i] = this.radius / 4;
                        var next = (i + 1) % this.numSegment;
                        var prev = (i > 0) ? i - 1 : this.numSegment - 1;
                        var offset = this.boundOffset[i];
                        offset += (this.radius - offset) / 15;
                        offset += ((this.boundOffset[next] + this.boundOffset[prev]) / 2 - offset) / 3;
                        this.boundOffsetBuff[i] = this.boundOffset[i] = offset;
                    }
                };

                Ball.prototype.react = function(b) {
                    var dx = this.x - b.x;
                    var dy = this.y - b.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < this.radius + b.radius && dist !== 0) {
                        var overlap = this.radius + b.radius - dist;
                        var nx = dx / dist;
                        var ny = dy / dist;
                        var force = overlap * 0.015;
                        this.vx += nx * force;
                        this.vy += ny * force;
                        b.vx -= nx * force;
                        b.vy -= ny * force;

                        this.calcBounds(b);
                        b.calcBounds(this);
                        this.updateBounds();
                        b.updateBounds();
                    }
                };

                Ball.prototype.getBoundOffset = function(px, py) {
                    var dx = this.x - px;
                    var dy = this.y - py;
                    var angle = Math.atan2(dy, dx) + Math.PI;
                    var idx = Math.floor((angle / (2 * Math.PI)) * this.boundOffset.length) % this.boundOffset.length;
                    if (idx < 0) idx += this.boundOffset.length;
                    return this.boundOffset[idx];
                };

                Ball.prototype.calcBounds = function(b) {
                    for (var i = 0; i < this.numSegment; i++) {
                        var tp = this.getSidePoint(i);
                        var bLen = b.getBoundOffset(tp.x, tp.y);
                        var dx = tp.x - b.x;
                        var dy = tp.y - b.y;
                        var td = Math.sqrt(dx * dx + dy * dy);
                        if (td < bLen) {
                            this.boundOffsetBuff[i] -= (bLen - td) / 2;
                        }
                    }
                };

                Ball.prototype.getSidePoint = function(index) {
                    return {
                        x: this.x + this.sidePoints[index].x * this.boundOffset[index],
                        y: this.y + this.sidePoints[index].y * this.boundOffset[index]
                    };
                };

                Ball.prototype.updateBounds = function() {
                    for (var i = 0; i < this.numSegment; i++)
                        this.boundOffset[i] = this.boundOffsetBuff[i];
                };

                // --- Create balls ---
                var balls = [];
                var numBalls = 18;
                for (var i = 0; i < numBalls; i++) {
                    var radius = Math.random() * 60 + 60;
                    var px = Math.random() * canvas.width;
                    var py = Math.random() * canvas.height;
                    var vAngle = Math.random() * Math.PI * 2;
                    var vLen = Math.random() * 10;
                    balls.push(new Ball(radius, px, py, vAngle, vLen));
                }

                // --- Drag support ---
                var dragged = null;
                var dragOffX = 0;
                var dragOffY = 0;

                canvas.addEventListener("mousedown", function(e) {
                    var rect = canvas.getBoundingClientRect();
                    var mx = e.clientX - rect.left;
                    var my = e.clientY - rect.top;
                    for (var i = balls.length - 1; i >= 0; i--) {
                        var b = balls[i];
                        var dx = mx - b.x;
                        var dy = my - b.y;
                        if (dx * dx + dy * dy <= b.radius * b.radius) {
                            dragged = b;
                            dragOffX = dx;
                            dragOffY = dy;
                            b.vx = 0;
                            b.vy = 0;
                            break;
                        }
                    }
                });

                canvas.addEventListener("mousemove", function(e) {
                    if (!dragged) return;
                    var rect = canvas.getBoundingClientRect();
                    dragged.x = e.clientX - rect.left - dragOffX;
                    dragged.y = e.clientY - rect.top - dragOffY;
                });

                canvas.addEventListener("mouseup", function() { dragged = null; });

                canvas.addEventListener("touchstart", function(e) {
                    var rect = canvas.getBoundingClientRect();
                    var t = e.touches[0];
                    var mx = t.clientX - rect.left;
                    var my = t.clientY - rect.top;
                    for (var i = balls.length - 1; i >= 0; i--) {
                        var b = balls[i];
                        var dx = mx - b.x;
                        var dy = my - b.y;
                        if (dx * dx + dy * dy <= b.radius * b.radius) {
                            dragged = b;
                            dragOffX = dx;
                            dragOffY = dy;
                            b.vx = 0;
                            b.vy = 0;
                            e.preventDefault();
                            break;
                        }
                    }
                });

                canvas.addEventListener("touchmove", function(e) {
                    if (!dragged) return;
                    var rect = canvas.getBoundingClientRect();
                    var t = e.touches[0];
                    dragged.x = t.clientX - rect.left - dragOffX;
                    dragged.y = t.clientY - rect.top - dragOffY;
                    e.preventDefault();
                });

                canvas.addEventListener("touchend", function() { dragged = null; });

                // --- Smooth closed path (Catmull-Rom to cubic Bezier) ---
                function drawSmoothBall(ball) {
                    var pts = [];
                    for (var i = 0; i < ball.numSegment; i++) {
                        pts.push(ball.getSidePoint(i));
                    }
                    var n = pts.length;
                    if (n < 3) return;

                    ctx.beginPath();
                    for (var i = 0; i < n; i++) {
                        var p0 = pts[(i - 1 + n) % n];
                        var p1 = pts[i];
                        var p2 = pts[(i + 1) % n];
                        var p3 = pts[(i + 2) % n];

                        var cp1x = p1.x + (p2.x - p0.x) / 6;
                        var cp1y = p1.y + (p2.y - p0.y) / 6;
                        var cp2x = p2.x - (p3.x - p1.x) / 6;
                        var cp2y = p2.y - (p3.y - p1.y) / 6;

                        if (i === 0) ctx.moveTo(p1.x, p1.y);
                        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
                    }
                    ctx.closePath();
                    ctx.fillStyle = "#000000";
                    ctx.fill();
                }

                // --- Main loop ---
                function loop() {
                    for (var i = 0; i < balls.length - 1; i++) {
                        for (var j = i + 1; j < balls.length; j++) {
                            balls[i].react(balls[j]);
                        }
                    }
                    for (var i = 0; i < balls.length; i++) {
                        if (balls[i] !== dragged) {
                            balls[i].iterate();
                        } else {
                            balls[i].updateShape();
                        }
                    }

                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (var i = 0; i < balls.length; i++) {
                        drawSmoothBall(balls[i]);
                    }

                    canvasAnimId = requestAnimationFrame(loop);
                }

                loop();
            }

            // Draggable window via grab track.
            (function() {
                const win = document.getElementById("win95-window");
                const track = document.getElementById("grab-track");
                let dragging = false;
                let offsetX = 0;
                let offsetY = 0;

                track.addEventListener("mousedown", function(e) {
                    dragging = true;
                    offsetX = e.clientX - win.offsetLeft;
                    offsetY = e.clientY - win.offsetTop;
                    e.preventDefault();
                });

                document.addEventListener("mousemove", function(e) {
                    if (!dragging) return;
                    win.style.left = (e.clientX - offsetX) + "px";
                    win.style.top = (e.clientY - offsetY) + "px";
                });

                document.addEventListener("mouseup", function() {
                    dragging = false;
                });

                // Touch support.
                track.addEventListener("touchstart", function(e) {
                    dragging = true;
                    const touch = e.touches[0];
                    offsetX = touch.clientX - win.offsetLeft;
                    offsetY = touch.clientY - win.offsetTop;
                    e.preventDefault();
                });

                document.addEventListener("touchmove", function(e) {
                    if (!dragging) return;
                    const touch = e.touches[0];
                    win.style.left = (touch.clientX - offsetX) + "px";
                    win.style.top = (touch.clientY - offsetY) + "px";
                });

                document.addEventListener("touchend", function() {
                    dragging = false;
                });
            })();

            // Window controls.
            document.getElementById("window-minimize").addEventListener("click", function() {
                const body = document.getElementById("window-body");
                body.style.display = body.style.display === "none" ? "flex" : "none";
            });

            document.getElementById("window-toggle-breadcrumb").addEventListener("click", function() {
                const bc = document.getElementById("breadcrumb");
                bc.style.display = bc.style.display === "none" ? "block" : "none";
            });

            // Dark mode toggle.
            document.getElementById("dark-mode-toggle").addEventListener("click", function() {
                document.body.classList.toggle("dark-mode");
            });
        </script>
    </body>
</html>
