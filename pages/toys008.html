<div id="settings-panel" class="win-window">
    <div id="settings-grab" class="win-grab">
        <button id="settings-minimize" title="Minimize">_</button>
        <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
        <div id="settings-grab-track" class="win-grab-track"></div>
    </div>
    <div id="settings-chrome" class="win-chrome">
        <div id="settings-body" class="win-body">
            <div class="settings-fieldset collapsed">
                <div class="settings-legend">About</div>
                <p>CMYK circles on a plane with subtractive colour blending.</p>
            </div>
            <div class="settings-fieldset">
                <div class="settings-legend">Controls</div>
                <label>
                    Radius
                    <input type="range" id="setting-radius" min="20" max="300" value="120">
                </label>
                <label>
                    Spacing
                    <input type="range" id="setting-spacing" min="0" max="300" value="30">
                </label>
                <label>
                    Count
                    <input type="range" id="setting-count" min="3" max="20" value="4">
                </label>
                <label>
                    Orbs
                    <input type="range" id="setting-orbs" min="1" max="12" value="5">
                </label>
                <label>
                    <input type="checkbox" id="setting-animate" checked>
                    Animate
                </label>
            </div>
        </div>
    </div>
</div>
<canvas id="home-canvas" style="display:block;width:100%;height:100%;"></canvas>
<script>
(function() {
    var settingsPanel = document.getElementById("settings-panel");

    document.getElementById("settings-minimize").addEventListener("click", function() {
        var body = document.getElementById("settings-body");
        body.style.display = body.style.display === "none" ? "block" : "none";
        if (window.__dockSystem) setTimeout(function() { window.__dockSystem.dock(); }, 0);
    });

    var legends = document.querySelectorAll("#settings-body .settings-legend");
    legends.forEach(function(legend) {
        legend.addEventListener("click", function() {
            legend.parentElement.classList.toggle("collapsed");
        });
    });

    window.makeDraggable("settings", settingsPanel, document.getElementById("settings-grab-track"));

    var canvas = document.getElementById("home-canvas");
    if (!canvas) return;
    var ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    var settings = {
        radius: 100,
        spacing: 30,
        count: 4,
        orbs: 5,
        animate: true
    };

    // CMYK base colours (subtractive primaries as RGB for screen).
    var cmykColours = [
        { r: 0, g: 255, b: 255 },   // Cyan
        { r: 255, g: 0, b: 255 },   // Magenta
        { r: 255, g: 255, b: 0 },   // Yellow
        { r: 0, g: 0, b: 0 }        // Key (Black)
    ];

    var PERSPECTIVE = 800;
    var PLANE_SIZE = 600;

    // --- 3D Rotation via mouse/touch drag (Y-axis only) ---
    var rotY = 0.4, rotX = -0.5;
    var camDragging = false, lastMX = 0;

    canvas.addEventListener("mousedown", function(e) {
        camDragging = true;
        lastMX = e.clientX;
    });
    document.addEventListener("mousemove", function(e) {
        if (!camDragging) return;
        rotY += (e.clientX - lastMX) * 0.005;
        lastMX = e.clientX;
    });
    document.addEventListener("mouseup", function() { camDragging = false; });

    canvas.addEventListener("touchstart", function(e) {
        camDragging = true;
        lastMX = e.touches[0].clientX;
    });
    document.addEventListener("touchmove", function(e) {
        if (!camDragging) return;
        rotY += (e.touches[0].clientX - lastMX) * 0.005;
        lastMX = e.touches[0].clientX;
    });
    document.addEventListener("touchend", function() { camDragging = false; });

    function applyRotation(x, y, z) {
        var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
        var rx = x * cosY + z * sinY;
        var rz = -x * sinY + z * cosY;
        var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
        var ry = y * cosX - rz * sinX;
        var rz2 = y * sinX + rz * cosX;
        return { x: rx, y: ry, z: rz2 };
    }

    function project(x, y, z) {
        var s = PERSPECTIVE / (PERSPECTIVE + z);
        return { sx: canvas.width / 2 + x * s, sy: canvas.height / 2 - y * s, scale: s };
    }

    // Orbs live on the XZ plane (y=0) in world space.
    var orbs = [];
    function initOrbs() {
        orbs = [];
        var minDist = settings.radius * 2 + settings.spacing;
        var half = PLANE_SIZE / 2;
        for (var i = 0; i < settings.orbs; i++) {
            var placed = false;
            for (var attempt = 0; attempt < 200; attempt++) {
                var px = (Math.random() - 0.5) * PLANE_SIZE;
                var pz = (Math.random() - 0.5) * PLANE_SIZE;
                var overlap = false;
                for (var j = 0; j < orbs.length; j++) {
                    var dx = px - orbs[j].px;
                    var dz = pz - orbs[j].pz;
                    if (Math.sqrt(dx * dx + dz * dz) < minDist) {
                        overlap = true;
                        break;
                    }
                }
                if (!overlap) {
                    var angle = Math.random() * Math.PI * 2;
                    var speed = 0.4 + Math.random() * 0.6;
                    orbs.push({
                        px: px,
                        pz: pz,
                        vx: Math.cos(angle) * speed,
                        vz: Math.sin(angle) * speed,
                        phase: Math.random() * Math.PI * 2
                    });
                    placed = true;
                    break;
                }
            }
            if (!placed) break;
        }
    }
    initOrbs();

    function updateOrbs() {
        var minDist = settings.radius * 2 + settings.spacing;
        var half = PLANE_SIZE / 2;

        for (var i = 0; i < orbs.length; i++) {
            orbs[i].px += orbs[i].vx;
            orbs[i].pz += orbs[i].vz;
        }

        // Bounce off plane edges.
        for (var i = 0; i < orbs.length; i++) {
            var o = orbs[i];
            var r = settings.radius;
            if (o.px - r < -half) { o.px = -half + r; o.vx = Math.abs(o.vx); }
            if (o.px + r > half) { o.px = half - r; o.vx = -Math.abs(o.vx); }
            if (o.pz - r < -half) { o.pz = -half + r; o.vz = Math.abs(o.vz); }
            if (o.pz + r > half) { o.pz = half - r; o.vz = -Math.abs(o.vz); }
        }

        // Bounce off each other.
        for (var i = 0; i < orbs.length; i++) {
            for (var j = i + 1; j < orbs.length; j++) {
                var dx = orbs[j].px - orbs[i].px;
                var dz = orbs[j].pz - orbs[i].pz;
                var dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < minDist && dist > 0) {
                    var nx = dx / dist;
                    var nz = dz / dist;
                    var dvx = orbs[i].vx - orbs[j].vx;
                    var dvz = orbs[i].vz - orbs[j].vz;
                    var dot = dvx * nx + dvz * nz;
                    if (dot > 0) {
                        orbs[i].vx -= dot * nx;
                        orbs[i].vz -= dot * nz;
                        orbs[j].vx += dot * nx;
                        orbs[j].vz += dot * nz;
                    }
                    var ov = minDist - dist;
                    orbs[i].px -= nx * ov * 0.5;
                    orbs[i].pz -= nz * ov * 0.5;
                    orbs[j].px += nx * ov * 0.5;
                    orbs[j].pz += nz * ov * 0.5;
                }
            }
        }
    }

    var time = 0;

    // Offscreen canvas for the 2D texture.
    var TEX_SIZE = 512;
    var texCanvas = document.createElement("canvas");
    texCanvas.width = TEX_SIZE;
    texCanvas.height = TEX_SIZE;
    var texCtx = texCanvas.getContext("2d");

    function drawTexture() {
        texCtx.fillStyle = "#ffffff";
        texCtx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

        texCtx.globalCompositeOperation = "multiply";
        var alpha = 1.0;

        for (var oi = 0; oi < orbs.length; oi++) {
            var orb = orbs[oi];
            var count = settings.count;
            var radius = settings.radius;
            var spacing = settings.spacing * (0.5 + 0.5 * Math.sin(time * 0.8 + orb.phase));

            // Map orb world coords to texture coords.
            var half = PLANE_SIZE / 2;
            var tcx = ((orb.px + half) / PLANE_SIZE) * TEX_SIZE;
            var tcy = ((orb.pz + half) / PLANE_SIZE) * TEX_SIZE;
            var texRadius = (radius / PLANE_SIZE) * TEX_SIZE;
            var texSpacing = (spacing / PLANE_SIZE) * TEX_SIZE;

            for (var i = 0; i < count; i++) {
                var angle = (Math.PI * 2 * i) / count + time * 0.3 + orb.phase;
                var x = tcx + Math.cos(angle) * texSpacing;
                var y = tcy + Math.sin(angle) * texSpacing;

                var col = cmykColours[i % cmykColours.length];
                texCtx.globalAlpha = alpha;
                texCtx.beginPath();
                texCtx.arc(x, y, texRadius, 0, Math.PI * 2);
                texCtx.fillStyle = "rgb(" + col.r + "," + col.g + "," + col.b + ")";
                texCtx.fill();
            }
        }

        texCtx.globalCompositeOperation = "source-over";
        texCtx.globalAlpha = 1.0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Render the 2D texture.
        drawTexture();

        // Project the plane corners into 3D.
        var half = PLANE_SIZE / 2;
        var corners3d = [
            applyRotation(-half, 0, -half),
            applyRotation(half, 0, -half),
            applyRotation(half, 0, half),
            applyRotation(-half, 0, half)
        ];
        var projected = [];
        for (var i = 0; i < 4; i++) {
            projected.push(project(corners3d[i].x, corners3d[i].y, corners3d[i].z));
        }

        // Draw textured plane using subdivided grid for perspective-correct mapping.
        var SUBDIVS = 16;
        var BLEED = 0.5; // Pixel bleed to close seams.
        for (var row = 0; row < SUBDIVS; row++) {
            for (var col = 0; col < SUBDIVS; col++) {
                var u0 = col / SUBDIVS, u1 = (col + 1) / SUBDIVS;
                var v0 = row / SUBDIVS, v1 = (row + 1) / SUBDIVS;

                // Bilinear interpolation in 3D space.
                var points = [
                    [u0, v0], [u1, v0], [u1, v1], [u0, v1]
                ];
                var screenPts = [];
                for (var pi = 0; pi < 4; pi++) {
                    var u = points[pi][0], v = points[pi][1];
                    var wx = -half + u * PLANE_SIZE;
                    var wz = -half + v * PLANE_SIZE;
                    var rot = applyRotation(wx, 0, wz);
                    screenPts.push(project(rot.x, rot.y, rot.z));
                }

                // Source rect from texture.
                var sx = u0 * TEX_SIZE, sy = v0 * TEX_SIZE;
                var sw = (u1 - u0) * TEX_SIZE, sh = (v1 - v0) * TEX_SIZE;

                // Use a transform to map the texture quad.
                // Expand clip path slightly to close seams.
                var cx = (screenPts[0].sx + screenPts[1].sx + screenPts[2].sx + screenPts[3].sx) / 4;
                var cy = (screenPts[0].sy + screenPts[1].sy + screenPts[2].sy + screenPts[3].sy) / 4;
                ctx.save();
                ctx.beginPath();
                for (var pi = 0; pi < 4; pi++) {
                    var ex = screenPts[pi].sx + (screenPts[pi].sx - cx) / Math.max(1, Math.sqrt((screenPts[pi].sx - cx) * (screenPts[pi].sx - cx) + (screenPts[pi].sy - cy) * (screenPts[pi].sy - cy))) * BLEED;
                    var ey = screenPts[pi].sy + (screenPts[pi].sy - cy) / Math.max(1, Math.sqrt((screenPts[pi].sx - cx) * (screenPts[pi].sx - cx) + (screenPts[pi].sy - cy) * (screenPts[pi].sy - cy))) * BLEED;
                    if (pi === 0) ctx.moveTo(ex, ey);
                    else ctx.lineTo(ex, ey);
                }
                ctx.closePath();
                ctx.clip();

                // Affine transform from texture to screen (using first triangle).
                var dx1 = screenPts[1].sx - screenPts[0].sx;
                var dy1 = screenPts[1].sy - screenPts[0].sy;
                var dx2 = screenPts[3].sx - screenPts[0].sx;
                var dy2 = screenPts[3].sy - screenPts[0].sy;

                ctx.setTransform(
                    dx1 / sw, dy1 / sw,
                    dx2 / sh, dy2 / sh,
                    screenPts[0].sx - (dx1 / sw) * sx - (dx2 / sh) * sy,
                    screenPts[0].sy - (dy1 / sw) * sx - (dy2 / sh) * sy
                );
                ctx.drawImage(texCanvas, 0, 0);
                ctx.restore();
            }
        }

        ctx.setTransform(1, 0, 0, 1, 0, 0);

        // Rope around the edge, raised above the plane.
        var ropeHeight = 20;
        var ropeCorners = [
            { x: -half, y: ropeHeight, z: -half },
            { x:  half, y: ropeHeight, z: -half },
            { x:  half, y: ropeHeight, z:  half },
            { x: -half, y: ropeHeight, z:  half }
        ];
        var ropeProjected = [];
        for (var ri = 0; ri < 4; ri++) {
            var r = applyRotation(ropeCorners[ri].x, ropeCorners[ri].y, ropeCorners[ri].z);
            ropeProjected.push(project(r.x, r.y, r.z));
        }
        ctx.beginPath();
        ctx.moveTo(ropeProjected[0].sx, ropeProjected[0].sy);
        ctx.lineTo(ropeProjected[1].sx, ropeProjected[1].sy);
        ctx.lineTo(ropeProjected[2].sx, ropeProjected[2].sy);
        ctx.lineTo(ropeProjected[3].sx, ropeProjected[3].sy);
        ctx.closePath();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    function loop() {
        if (settings.animate) {
            time += 0.005;
            updateOrbs();
            if (!camDragging) rotY += 0.001;
        }
        draw();
        window.__homeCanvasAnimId = requestAnimationFrame(loop);
    }

    // Settings bindings.
    document.getElementById("setting-radius").addEventListener("input", function() {
        settings.radius = parseInt(this.value);
    });
    document.getElementById("setting-spacing").addEventListener("input", function() {
        settings.spacing = parseInt(this.value);
    });
    document.getElementById("setting-count").addEventListener("input", function() {
        settings.count = parseInt(this.value);
    });
    document.getElementById("setting-orbs").addEventListener("input", function() {
        settings.orbs = parseInt(this.value);
        initOrbs();
    });
    document.getElementById("setting-animate").addEventListener("change", function() {
        settings.animate = this.checked;
    });

    loop();
})();
</script>
