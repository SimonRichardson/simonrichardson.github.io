<div id="settings-panel" class="win-window" tabindex="0" role="region" aria-label="Settings">
    <div id="settings-grab" class="win-grab">
        <button id="settings-minimize" title="Minimize">_</button>
        <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
        <div id="settings-grab-track" class="win-grab-track"></div>
    </div>
    <div id="settings-chrome" class="win-chrome">
        <div id="settings-body" class="win-body">
            <div class="settings-fieldset collapsed">
                <div class="settings-legend">About</div>
                <p>Raft consensus simulation. Nodes elect leaders, replicate logs, and self-heal when connections drop. 3D arena with Y-axis rotation.</p>
            </div>
            <div class="settings-fieldset">
                <div class="settings-legend">Controls</div>
                <label>
                    Nodes
                    <input type="range" id="setting-nodes" min="5" max="25" value="13">
                </label>
                <label>
                    Speed
                    <input type="range" id="setting-stiffness" min="1" max="100" value="30">
                </label>
                <label>
                    <input type="checkbox" id="setting-autorotate" checked>
                    Auto-rotate
                </label>
                <label>
                    <input type="checkbox" id="setting-animate" checked>
                    Animate
                </label>
            </div>
        </div>
    </div>
</div>
<div id="raft-log-panel" class="win-window" tabindex="0" role="region" aria-label="Raft Log">
    <div id="raft-log-grab" class="win-grab">
        <button id="raft-log-minimize" title="Minimize">_</button>
        <button class="dock-undock-btn" title="Undock" style="display:none;">&#9776;</button>
        <div id="raft-log-grab-track" class="win-grab-track"></div>
    </div>
    <div id="raft-log-content">
        <div id="raft-log-chrome" class="win-chrome">
            <div id="raft-log-body" class="win-body">
                <div class="settings-fieldset">
                    <div class="settings-legend">Raft Log</div>
                    <textarea id="raft-log-text" readonly></textarea>
                    <button id="raft-log-clear">Clear</button>
                </div>
            </div>
        </div>
        <div id="raft-log-resize-row">
            <div id="raft-log-resize"></div>
            <div id="raft-log-resize-corner"></div>
        </div>
    </div>
    <div id="raft-log-resize-right"></div>
</div>
<canvas id="home-canvas"></canvas>
<script>
(function() {
    // --- Settings panel logic ---
    var settingsPanel = document.getElementById("settings-panel");

    var settings = {
        numNodes: 13,
        speed: 1.5,
        autoRotate: true,
        animate: true
    };

    document.getElementById("settings-minimize").addEventListener("click", function() {
        var body = document.getElementById("settings-body");
        body.style.display = body.style.display === "none" ? "block" : "none";
    });

    var legends = document.querySelectorAll("#settings-body .settings-legend");
    for (var i = 0; i < legends.length; i++) {
        legends[i].addEventListener("click", function() {
            this.parentElement.classList.toggle("collapsed");
            if (window.__dockSystem) setTimeout(function() { window.__dockSystem.dock(); }, 50);
        });
    }

    document.getElementById("setting-nodes").addEventListener("input", function() {
        var n = parseInt(this.value, 10) || 13;
        if (n !== settings.numNodes) {
            settings.numNodes = n;
            initNodes();
        }
    });
    document.getElementById("setting-stiffness").addEventListener("input", function() {
        var newSpeed = parseFloat(this.value) / 20;
        for (var i = 0; i < nodes.length; i++) {
            var mag = Math.sqrt(nodes[i].vx * nodes[i].vx + nodes[i].vy * nodes[i].vy + nodes[i].vz * nodes[i].vz) || 1;
            nodes[i].vx = (nodes[i].vx / mag) * newSpeed;
            nodes[i].vy = (nodes[i].vy / mag) * newSpeed;
            nodes[i].vz = (nodes[i].vz / mag) * newSpeed;
        }
        settings.speed = newSpeed;
    });
    document.getElementById("setting-autorotate").addEventListener("change", function() {
        settings.autoRotate = this.checked;
    });
    document.getElementById("setting-animate").addEventListener("change", function() {
        settings.animate = this.checked;
        if (settings.animate && !window.__homeCanvasAnimId) loop();
    });

    window.makeDraggable("settings", settingsPanel, document.getElementById("settings-grab-track"));

    // --- Raft log panel ---
    var raftLogPanel = document.getElementById("raft-log-panel");
    var raftLogText = document.getElementById("raft-log-text");

    document.getElementById("raft-log-minimize").addEventListener("click", function() {
        var body = document.getElementById("raft-log-body");
        body.style.display = body.style.display === "none" ? "block" : "none";
    });

    var raftLegends = document.querySelectorAll("#raft-log-body .settings-legend");
    for (var i = 0; i < raftLegends.length; i++) {
        raftLegends[i].addEventListener("click", function() {
            this.parentElement.classList.toggle("collapsed");
            if (window.__dockSystem) setTimeout(function() { window.__dockSystem.dock(); }, 50);
        });
    }

    document.getElementById("raft-log-clear").addEventListener("click", function() {
        raftLogText.value = "";
    });

    // Resize handle for raft log textarea (vertical).
    (function() {
        var resizeBar = document.getElementById("raft-log-resize");
        var dragging = false;
        var startY = 0;
        var startH = 0;

        resizeBar.addEventListener("mousedown", function(e) {
            dragging = true;
            startY = e.clientY;
            startH = raftLogText.offsetHeight;
            e.preventDefault();
        });
        document.addEventListener("mousemove", function(e) {
            if (!dragging) return;
            var newH = Math.max(150, Math.min(500, startH + (e.clientY - startY)));
            raftLogText.style.height = newH + "px";
        });
        document.addEventListener("mouseup", function() {
            dragging = false;
        });

        resizeBar.addEventListener("touchstart", function(e) {
            dragging = true;
            startY = e.touches[0].clientY;
            startH = raftLogText.offsetHeight;
            e.preventDefault();
        }, { passive: false });
        document.addEventListener("touchmove", function(e) {
            if (!dragging) return;
            var newH = Math.max(150, Math.min(500, startH + (e.touches[0].clientY - startY)));
            raftLogText.style.height = newH + "px";
        });
        document.addEventListener("touchend", function() {
            dragging = false;
        });
    })();

    // Resize handle for raft log panel (horizontal).
    (function() {
        var resizeBar = document.getElementById("raft-log-resize-right");
        var chrome = document.getElementById("raft-log-chrome");
        var dragging = false;
        var startX = 0;
        var startW = 0;

        resizeBar.addEventListener("mousedown", function(e) {
            dragging = true;
            startX = e.clientX;
            startW = chrome.offsetWidth;
            e.preventDefault();
        });
        document.addEventListener("mousemove", function(e) {
            if (!dragging) return;
            var newW = Math.max(150, Math.min(500, startW + (e.clientX - startX)));
            chrome.style.width = newW + "px";
        });
        document.addEventListener("mouseup", function() {
            dragging = false;
        });

        resizeBar.addEventListener("touchstart", function(e) {
            dragging = true;
            startX = e.touches[0].clientX;
            startW = chrome.offsetWidth;
            e.preventDefault();
        }, { passive: false });
        document.addEventListener("touchmove", function(e) {
            if (!dragging) return;
            var newW = Math.max(150, Math.min(500, startW + (e.touches[0].clientX - startX)));
            chrome.style.width = newW + "px";
        });
        document.addEventListener("touchend", function() {
            dragging = false;
        });
    })();

    // Corner resize handle (both width and height).
    (function() {
        var corner = document.getElementById("raft-log-resize-corner");
        var chrome = document.getElementById("raft-log-chrome");
        var dragging = false;
        var startX = 0;
        var startY = 0;
        var startW = 0;
        var startH = 0;

        corner.addEventListener("mousedown", function(e) {
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startW = chrome.offsetWidth;
            startH = raftLogText.offsetHeight;
            e.preventDefault();
        });
        document.addEventListener("mousemove", function(e) {
            if (!dragging) return;
            var newW = Math.max(150, Math.min(500, startW + (e.clientX - startX)));
            var newH = Math.max(150, Math.min(500, startH + (e.clientY - startY)));
            chrome.style.width = newW + "px";
            raftLogText.style.height = newH + "px";
        });
        document.addEventListener("mouseup", function() {
            dragging = false;
        });

        corner.addEventListener("touchstart", function(e) {
            dragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            startW = chrome.offsetWidth;
            startH = raftLogText.offsetHeight;
            e.preventDefault();
        }, { passive: false });
        document.addEventListener("touchmove", function(e) {
            if (!dragging) return;
            var newW = Math.max(150, Math.min(500, startW + (e.touches[0].clientX - startX)));
            var newH = Math.max(150, Math.min(500, startH + (e.touches[0].clientY - startY)));
            chrome.style.width = newW + "px";
            raftLogText.style.height = newH + "px";
        });
        document.addEventListener("touchend", function() {
            dragging = false;
        });
    })();

    window.makeDraggable("raft-log", raftLogPanel, document.getElementById("raft-log-grab-track"));

    // Dock raft-log panel under settings.
    setTimeout(function() {
        if (window.__dockSystem) {
            window.__dockSystem.forceDock(["settings", "raft-log"]);
        }
    }, 0);

    function raftLog(msg) {
        raftLogText.value += msg + "\n";
        raftLogText.scrollTop = raftLogText.scrollHeight;
    }

    var canvas = document.getElementById("home-canvas");
    if (!canvas) return;
    var ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // --- 3D parameters ---
    var PERSPECTIVE = 800;
    var PLANE_SIZE = 250;
    var GRAVITY = 0.15;
    var FLOAT_FORCE = 0.08;
    var FLOAT_HEIGHT = 120;
    var BOUNCE_3D = 0.85;
    var DAMPING = 0.999;
    var FRICTION = 0.99;
    var ROPE_HEIGHT = 40;

    // --- Camera rotation (Y-axis only) ---
    var rotY = 0.4, rotX = -0.5;
    var camDragging = false, lastMX = 0;

    canvas.addEventListener("mousedown", function(e) {
        camDragging = true;
        lastMX = e.clientX;
    });
    document.addEventListener("mousemove", function(e) {
        if (!camDragging) return;
        rotY += (e.clientX - lastMX) * 0.005;
        lastMX = e.clientX;
    });
    document.addEventListener("mouseup", function() {
        camDragging = false;
    });

    canvas.addEventListener("touchstart", function(e) {
        camDragging = true;
        lastMX = e.touches[0].clientX;
    });
    document.addEventListener("touchmove", function(e) {
        if (!camDragging) return;
        rotY += (e.touches[0].clientX - lastMX) * 0.005;
        lastMX = e.touches[0].clientX;
    });
    document.addEventListener("touchend", function() {
        camDragging = false;
    });

    function applyRotation(x, y, z) {
        var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
        var rx = x * cosY + z * sinY;
        var rz = -x * sinY + z * cosY;
        var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
        var ry = y * cosX - rz * sinX;
        var rz2 = y * sinX + rz * cosX;
        return { x: rx, y: ry, z: rz2 };
    }

    function project(x, y, z) {
        var scale = PERSPECTIVE / (PERSPECTIVE + z);
        return {
            sx: canvas.width / 2 + x * scale,
            sy: canvas.height / 2 - y * scale,
            scale: scale
        };
    }

    // --- Raft Node (3D) ---
    var STATES = { FOLLOWER: 0, CANDIDATE: 1, LEADER: 2, DISCONNECTED: 3 };
    var STATE_NAMES = ["follower", "candidate", "leader", "disconnected"];

    var nodes = [];
    var connections = [];

    function Node(id, x, y, z) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.z = z;
        var speed = 1.5;
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.random() * Math.PI * 0.5;
        this.vx = Math.cos(theta) * speed;
        this.vy = Math.random() * 2;
        this.vz = Math.sin(theta) * speed;
        this.baseRadius = 15 + Math.random() * 25;
        this.radius = this.baseRadius;
        this.targetRadius = this.baseRadius;
        this.state = STATES.FOLLOWER;
        this.term = 0;
        this.votedFor = -1;
        this.votes = 0;
        this.leaderId = -1;
        this.electionTimeout = randomTimeout();
        this.electionTimer = 0;
        this.heartbeatTimer = 0;
        this.connected = true;
        this.gracePeriod = 0;
    }

    function randomTimeout() {
        return 150 + Math.random() * 150;
    }

    function initNodes() {
        nodes = [];
        connections = [];

        for (var i = 0; i < settings.numNodes; i++) {
            var angle = (i / settings.numNodes) * Math.PI * 2;
            var r = PLANE_SIZE * (0.3 + Math.random() * 0.5);
            var x = Math.cos(angle) * r;
            var y = 15 + Math.random() * 100;
            var z = Math.sin(angle) * r;
            nodes.push(new Node(i, x, y, z));
        }

        // Initial full mesh connections.
        for (var i = 0; i < nodes.length; i++) {
            for (var j = i + 1; j < nodes.length; j++) {
                connections.push({
                    from: i,
                    to: j,
                    active: true,
                    strength: 1.0,
                    healTimer: 0
                });
            }
        }
    }

    initNodes();

    // --- Raft Simulation ---
    function simulate() {
        var dt = 1;
        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            if (!node.connected) continue;

            if (node.state === STATES.LEADER) {
                node.heartbeatTimer += dt;
                if (node.heartbeatTimer > 50) {
                    node.heartbeatTimer = 0;
                    sendHeartbeats(node);
                }
            } else {
                node.electionTimer += dt;
                if (node.electionTimer > node.electionTimeout) {
                    startElection(node);
                }
            }
        }
    }

    function disconnectNode(node) {
        node.connected = false;
        node.state = STATES.DISCONNECTED;
        node.targetRadius = node.baseRadius;
        node.gracePeriod = 60;
        raftLog("node " + node.id + " disconnected");
        spawnHalo(node);

        for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if (c.from === node.id || c.to === node.id) {
                c.active = false;
                c.healTimer = 0;
            }
        }
    }

    function reconnectNode(node) {
        node.connected = true;
        node.state = STATES.FOLLOWER;
        node.electionTimer = 0;
        node.electionTimeout = randomTimeout();
        node.votedFor = -1;
        node.leaderId = -1;
        node.gracePeriod = 60;
        raftLog("node " + node.id + " reconnected");

        var angle = Math.random() * Math.PI * 2;
        node.vx = Math.cos(angle) * settings.speed;
        node.vy = Math.random() * 2;
        node.vz = Math.sin(angle) * settings.speed;

        for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if (c.from === node.id || c.to === node.id) {
                var other = c.from === node.id ? nodes[c.to] : nodes[c.from];
                if (other.connected) {
                    c.active = true;
                    c.strength = 0.0;
                    c.healTimer = 0;
                }
            }
        }
    }

    function startElection(node) {
        node.state = STATES.CANDIDATE;
        node.term++;
        node.votedFor = node.id;
        node.votes = 1;
        node.electionTimer = 0;
        node.electionTimeout = randomTimeout();

        for (var i = 0; i < nodes.length; i++) {
            if (i === node.id || !nodes[i].connected) continue;
            if (!isConnected(node.id, i)) continue;
            if (nodes[i].term < node.term && nodes[i].votedFor === -1) {
                nodes[i].votedFor = node.id;
                nodes[i].term = node.term;
                node.votes++;
            }
        }

        var majority = Math.floor(countConnected() / 2) + 1;
        if (node.votes >= majority) {
            becomeLeader(node);
        } else {
            node.state = STATES.FOLLOWER;
            node.electionTimeout = randomTimeout();
        }
    }

    var MAX_RADIUS = 50;

    function becomeLeader(node) {
        node.state = STATES.LEADER;
        node.heartbeatTimer = 0;
        node.targetRadius = Math.min(node.baseRadius * 1.8, MAX_RADIUS);
        raftLog("node " + node.id + " elected leader (term " + node.term + ")");

        for (var i = 0; i < nodes.length; i++) {
            if (i === node.id) continue;
            if (nodes[i].state === STATES.LEADER) {
                nodes[i].state = STATES.FOLLOWER;
                nodes[i].targetRadius = nodes[i].baseRadius;
            }
            if (nodes[i].connected && isConnected(node.id, i)) {
                nodes[i].leaderId = node.id;
            }
        }
    }

    function sendHeartbeats(leader) {
        for (var i = 0; i < nodes.length; i++) {
            if (i === leader.id || !nodes[i].connected) continue;
            if (!isConnected(leader.id, i)) continue;
            nodes[i].electionTimer = 0;
            nodes[i].leaderId = leader.id;
            nodes[i].term = leader.term;
            nodes[i].votedFor = -1;
            if (nodes[i].state === STATES.CANDIDATE) {
                nodes[i].state = STATES.FOLLOWER;
            }
        }
    }

    function isConnected(a, b) {
        for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if ((c.from === a && c.to === b) || (c.from === b && c.to === a)) {
                return c.active;
            }
        }
        return false;
    }

    function countConnected() {
        var count = 0;
        for (var i = 0; i < nodes.length; i++) {
            if (nodes[i].connected) count++;
        }
        return count;
    }

    // --- 3D Physics ---
    function updatePhysics() {
        var maxSpeed = settings.speed * 2;
        var limit = PLANE_SIZE;
        var maxHeight = PLANE_SIZE * 1.5;

        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];

            // Clamp velocity.
            var mag = Math.sqrt(node.vx * node.vx + node.vy * node.vy + node.vz * node.vz);
            if (mag > maxSpeed) {
                node.vx = (node.vx / mag) * maxSpeed;
                node.vy = (node.vy / mag) * maxSpeed;
                node.vz = (node.vz / mag) * maxSpeed;
            }

            // Animate radius toward target.
            node.radius += (node.targetRadius - node.radius) * 0.1;

            // Tick down grace period.
            if (node.gracePeriod > 0) node.gracePeriod--;

            // Gravity / floating.
            if (!node.connected) {
                // Disconnected: heavy gravity, fall to floor.
                node.vy -= GRAVITY * 2;
                node.vx *= 0.98;
                node.vz *= 0.98;
            } else if (node.leaderId >= 0 || node.state === STATES.LEADER) {
                // Connected with leader: float upward, capped at FLOAT_HEIGHT.
                if (node.y < FLOAT_HEIGHT) {
                    node.vy += FLOAT_FORCE;
                } else {
                    node.vy *= 0.9;
                    if (node.y > FLOAT_HEIGHT) {
                        node.vy -= GRAVITY * 0.5;
                    }
                }
            } else {
                // Connected but no leader yet: float to half height.
                var halfFloat = FLOAT_HEIGHT * 0.5;
                if (node.y < halfFloat) {
                    node.vy += FLOAT_FORCE * 0.6;
                } else {
                    node.vy *= 0.9;
                    if (node.y > halfFloat) {
                        node.vy -= GRAVITY * 0.3;
                    }
                }
            }

            // Damping.
            node.vx *= DAMPING;
            node.vy *= DAMPING;
            node.vz *= DAMPING;

            // Move.
            node.x += node.vx;
            node.y += node.vy;
            node.z += node.vz;

            // Bounce off plane floor (y = 0).
            if (node.y < node.radius) {
                node.y = node.radius;
                node.vy = Math.abs(node.vy) * BOUNCE_3D;
                node.vx *= FRICTION;
                node.vz *= FRICTION;
            }

            // Max height.
            if (node.y > maxHeight) {
                node.y = maxHeight;
                node.vy = -Math.abs(node.vy) * BOUNCE_3D;
            }

            // Plane boundary walls.
            if (node.x < -limit + node.radius) { node.x = -limit + node.radius; node.vx = Math.abs(node.vx) * BOUNCE_3D; }
            if (node.x > limit - node.radius) { node.x = limit - node.radius; node.vx = -Math.abs(node.vx) * BOUNCE_3D; }
            if (node.z < -limit + node.radius) { node.z = -limit + node.radius; node.vz = Math.abs(node.vz) * BOUNCE_3D; }
            if (node.z > limit - node.radius) { node.z = limit - node.radius; node.vz = -Math.abs(node.vz) * BOUNCE_3D; }
        }

        // 3D ball-ball collisions.
        for (var i = 0; i < nodes.length; i++) {
            for (var j = i + 1; j < nodes.length; j++) {
                var a = nodes[i];
                var b = nodes[j];
                var dx = b.x - a.x;
                var dy = b.y - a.y;
                var dz = b.z - a.z;
                var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                var minDist = a.radius + b.radius + 2;

                if (dist < minDist && dist > 0.001) {
                    // Separate.
                    var nx = dx / dist;
                    var ny = dy / dist;
                    var nz = dz / dist;
                    var overlap = (minDist - dist) * 0.5;
                    a.x -= nx * overlap;
                    a.y -= ny * overlap;
                    a.z -= nz * overlap;
                    b.x += nx * overlap;
                    b.y += ny * overlap;
                    b.z += nz * overlap;

                    // Elastic collision.
                    var dvx = a.vx - b.vx;
                    var dvy = a.vy - b.vy;
                    var dvz = a.vz - b.vz;
                    var dot = dvx * nx + dvy * ny + dvz * nz;
                    if (dot > 0) {
                        a.vx -= dot * nx;
                        a.vy -= dot * ny;
                        a.vz -= dot * nz;
                        b.vx += dot * nx;
                        b.vy += dot * ny;
                        b.vz += dot * nz;
                    }

                    // Raft collision logic.
                    if (!a.connected && b.connected && a.gracePeriod <= 0) {
                        reconnectNode(a);
                    } else if (!b.connected && a.connected && b.gracePeriod <= 0) {
                        reconnectNode(b);
                    } else if (a.connected && b.connected && a.gracePeriod <= 0 && b.gracePeriod <= 0) {
                        if (a.leaderId >= 0) {
                            a.leaderId = -1;
                            a.electionTimer = 0;
                            a.electionTimeout = randomTimeout();
                            a.votedFor = -1;
                        }
                        if (b.leaderId >= 0) {
                            b.leaderId = -1;
                            b.electionTimer = 0;
                            b.electionTimeout = randomTimeout();
                            b.votedFor = -1;
                        }

                        var magA = a.vx * a.vx + a.vy * a.vy + a.vz * a.vz;
                        var magB = b.vx * b.vx + b.vy * b.vy + b.vz * b.vz;
                        var slower = magA < magB ? a : b;
                        disconnectNode(slower);
                    }
                }
            }
        }

        // Heal connections over time.
        for (var i = 0; i < connections.length; i++) {
            var c = connections[i];
            if (c.active && c.strength < 1.0) {
                c.strength = Math.min(1.0, c.strength + 0.005);
            }
        }
    }

    // --- Message particles (3D) ---
    var particles = [];
    var PARTICLE_RADIUS = 3;
    var PARTICLE_SPEED = 0.015;
    var SPAWN_INTERVAL = 30;
    var spawnTimer = 0;

    function spawnParticles() {
        spawnTimer++;
        if (spawnTimer < SPAWN_INTERVAL) return;
        spawnTimer = 0;

        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            if (!node.connected || node.leaderId < 0) continue;
            var leader = nodes[node.leaderId];
            if (!leader || !leader.connected) continue;
            particles.push({ from: i, to: node.leaderId, t: 0 });
        }
    }

    function updateParticles() {
        for (var i = particles.length - 1; i >= 0; i--) {
            var p = particles[i];
            p.t += PARTICLE_SPEED;
            if (p.t >= 1 || !nodes[p.from].connected || !nodes[p.to].connected) {
                particles.splice(i, 1);
            }
        }
    }

    // --- Disconnect halos ---
    var halos = [];

    function spawnHalo(node) {
        halos.push({ nodeId: node.id, radius: node.radius, alpha: 1.0 });
    }

    function updateHalos() {
        for (var i = halos.length - 1; i >= 0; i--) {
            var h = halos[i];
            h.radius += 1.5;
            h.alpha -= 0.02;
            if (h.alpha <= 0) halos.splice(i, 1);
        }
    }

    // --- 3D Drawing ---
    function drawPlane() {
        var corners = [
            { x: -PLANE_SIZE, y: 0, z: -PLANE_SIZE },
            { x:  PLANE_SIZE, y: 0, z: -PLANE_SIZE },
            { x:  PLANE_SIZE, y: 0, z:  PLANE_SIZE },
            { x: -PLANE_SIZE, y: 0, z:  PLANE_SIZE }
        ];

        var projected = [];
        for (var i = 0; i < 4; i++) {
            var r = applyRotation(corners[i].x, corners[i].y, corners[i].z);
            projected.push(project(r.x, r.y, r.z));
        }

        ctx.beginPath();
        ctx.moveTo(projected[0].sx, projected[0].sy);
        ctx.lineTo(projected[1].sx, projected[1].sy);
        ctx.lineTo(projected[2].sx, projected[2].sy);
        ctx.lineTo(projected[3].sx, projected[3].sy);
        ctx.closePath();
        ctx.fillStyle = "#000000";
        ctx.fill();

        // Rope around the edge, raised above the plane (free-hanging, no posts).
        var ropeCorners = [
            { x: -PLANE_SIZE, y: ROPE_HEIGHT, z: -PLANE_SIZE },
            { x:  PLANE_SIZE, y: ROPE_HEIGHT, z: -PLANE_SIZE },
            { x:  PLANE_SIZE, y: ROPE_HEIGHT, z:  PLANE_SIZE },
            { x: -PLANE_SIZE, y: ROPE_HEIGHT, z:  PLANE_SIZE }
        ];

        var ropeProjected = [];
        for (var i = 0; i < 4; i++) {
            var r = applyRotation(ropeCorners[i].x, ropeCorners[i].y, ropeCorners[i].z);
            ropeProjected.push(project(r.x, r.y, r.z));
        }

        // Rope line.
        ctx.beginPath();
        ctx.moveTo(ropeProjected[0].sx, ropeProjected[0].sy);
        ctx.lineTo(ropeProjected[1].sx, ropeProjected[1].sy);
        ctx.lineTo(ropeProjected[2].sx, ropeProjected[2].sy);
        ctx.lineTo(ropeProjected[3].sx, ropeProjected[3].sy);
        ctx.closePath();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawPlane();

        // Build a draw list sorted by z-depth.
        var drawList = [];

        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            var r = applyRotation(node.x, node.y, node.z);
            drawList.push({ z: r.z, type: "node", node: node, rotated: r });
        }

        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            var from = nodes[p.from];
            var to = nodes[p.to];
            var px = from.x + (to.x - from.x) * p.t;
            var py = from.y + (to.y - from.y) * p.t;
            var pz = from.z + (to.z - from.z) * p.t;
            var r = applyRotation(px, py, pz);
            drawList.push({ z: r.z, type: "particle", rotated: r });
        }

        for (var i = 0; i < halos.length; i++) {
            var h = halos[i];
            var hNode = nodes[h.nodeId];
            var r = applyRotation(hNode.x, hNode.y, hNode.z);
            drawList.push({ z: r.z, type: "halo", halo: h, rotated: r });
        }

        // Sort far-to-near.
        drawList.sort(function(a, b) { return b.z - a.z; });

        for (var i = 0; i < drawList.length; i++) {
            var item = drawList[i];
            var proj = project(item.rotated.x, item.rotated.y, item.rotated.z);

            if (item.type === "node") {
                var screenRadius = item.node.radius * proj.scale;
                ctx.beginPath();
                ctx.arc(proj.sx, proj.sy, screenRadius, 0, Math.PI * 2);
                ctx.fillStyle = item.node.state === STATES.DISCONNECTED ? "#ffdd00" : "#ffffff";
                ctx.fill();
            } else if (item.type === "particle") {
                var screenR = PARTICLE_RADIUS * proj.scale;
                ctx.beginPath();
                ctx.arc(proj.sx, proj.sy, screenR, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
            } else if (item.type === "halo") {
                var screenR = item.halo.radius * proj.scale;
                ctx.beginPath();
                ctx.arc(proj.sx, proj.sy, screenR, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, " + item.halo.alpha + ")";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
    }

    // --- Idle detection: jitter + force re-election when everything settles ---
    var idleTimer = 0;
    var IDLE_THRESHOLD = 180; // ~3 seconds at 60fps

    function checkIdle() {
        var totalSpeed = 0;
        var hasLeader = false;
        var connectedCount = 0;

        for (var i = 0; i < nodes.length; i++) {
            var n = nodes[i];
            totalSpeed += Math.abs(n.vx) + Math.abs(n.vy) + Math.abs(n.vz);
            if (n.state === STATES.LEADER) hasLeader = true;
            if (n.connected) connectedCount++;
        }

        var avgSpeed = totalSpeed / nodes.length;

        if (avgSpeed < 0.3 && connectedCount > 0) {
            idleTimer++;
        } else {
            idleTimer = 0;
        }

        if (idleTimer > IDLE_THRESHOLD) {
            idleTimer = 0;

            // Add jitter to all nodes.
            for (var i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                var angle = Math.random() * Math.PI * 2;
                n.vx += Math.cos(angle) * settings.speed * 0.5;
                n.vz += Math.sin(angle) * settings.speed * 0.5;
                n.vy += (Math.random() - 0.3) * settings.speed * 0.3;
            }

            // If no leader, force an election.
            if (!hasLeader && connectedCount > 0) {
                for (var i = 0; i < nodes.length; i++) {
                    if (nodes[i].connected) {
                        nodes[i].electionTimer = nodes[i].electionTimeout;
                        break;
                    }
                }
            }
        }
    }

    // --- Main loop ---
    function loop() {
        if (!settings.animate) {
            window.__homeCanvasAnimId = null;
            return;
        }

        if (settings.autoRotate && !camDragging) {
            rotY += 0.003;
        }

        simulate();
        updatePhysics();
        checkIdle();
        spawnParticles();
        updateParticles();
        updateHalos();
        draw();

        window.__homeCanvasAnimId = requestAnimationFrame(loop);
    }

    loop();
})();
</script>
